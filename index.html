<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monitoring Presensi Korwil Sine</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
  <style>
    .loader { border-top-color: #3b82f6; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .bg-late { background-color: #fef9c3; }
    .bg-outside { background-color: #fee2e2; }
    .bg-psw { background-color: #d1fae5; }
  </style>
</head>
<body class="bg-gray-100">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // ==================== KONEKSI BACKEND ====================
    const BACKEND_URL = 'https://script.google.com/macros/s/AKfycbyjzVmFk2YosZLXEsSdAdDy0Y_2Qw6tGH-23Mj-94zmS7t9_sLfn2SHEUznbojwpyI-/exec';
    
    const runGoogleScript = async (action, ...args) => {
      try {
        const res = await fetch(BACKEND_URL, {
          method: 'POST',
          mode: 'cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action, arguments: args })
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        if (data && data.success === false) throw new Error(data.message);
        return data;
      } catch (err) {
        console.error(action, err);
        if (action === 'login') return { success: false };
        if (['getPresensi', 'getIjin', 'getPegawai', 'getActivityLogs', 'getPegawaiByLembaga'].includes(action)) return [];
        return { success: false, message: err.message };
      }
    };

    // ==================== FUNGSI PEMBANTU ====================
    const extractFileIdFromDriveUrl = (url) => {
      if (!url) return null;
      let m = url.match(/\/file\/d\/([^\/]+)/);
      if (m) return m[1];
      m = url.match(/[?&]id=([^&]+)/);
      return m ? m[1] : null;
    };

    const checkLate = (waktu, jenis) => {
      if (!waktu || jenis !== 'Datang') return false;
      const match = waktu.match(/pukul (\d{1,2})[\.\:](\d{2})/);
      if (!match) return false;
      const jam = parseInt(match[1]), menit = parseInt(match[2]);
      return (jam * 60 + menit) > 450;
    };

    const isOutside = (ket) => ket && ket.toLowerCase().includes('luar radius');
    const isTdkHadir = (ket) => ket && (ket.toLowerCase().includes('tidak hadir') || ket.toLowerCase().includes('hari libur'));
    const normalize = (s) => s ? s.replace(/[^a-z0-9]/gi, '').toLowerCase() : '';

    const parsePresensiDate = (waktu) => {
      if (!waktu) return null;
      const parts = waktu.split('pukul')[0].trim().split(', ');
      if (parts.length < 2) return null;
      const [day, month, year] = parts[1].split(' ');
      const monthMap = { Januari:1, Februari:2, Maret:3, April:4, Mei:5, Juni:6, Juli:7, Agustus:8, September:9, Oktober:10, November:11, Desember:12 };
      const m = monthMap[month];
      if (!m) return null;
      return `${day.padStart(2,'0')}/${m.toString().padStart(2,'0')}/${year}`;
    };

    const enrichWithIjin = (presensi, ijin) => {
      if (!presensi) return [];
      const approved = (ijin || []).filter(i => i.Status && i.Status.toLowerCase() === 'disetujui');
      return presensi.map(p => {
        const psw = approved.some(i => {
          if (normalize(p['Nama Pegawai']) !== normalize(i['Nama Pegawai'])) return false;
          const tgl = parsePresensiDate(p['Waktu']);
          if (!tgl) return false;
          const start = i['Tanggal Awal'] ? i['Tanggal Awal'].split('-').reverse().join('/') : null;
          const end = i['Tanggal Berakir'] ? i['Tanggal Berakir'].split('-').reverse().join('/') : null;
          return start && end && tgl >= start && tgl <= end;
        });
        return { ...p, isPSW: psw, displayRadius: psw ? 'PSW' : p['Keterangan Radius'] };
      });
    };

    // ==================== KOMPONEN PAGINATION ====================
    const Pagination = ({ page, total, rows, setPage, setRows }) => {
      const totalPages = Math.ceil(total / rows) || 1;
      const [jump, setJump] = useState('');
      return (
        <div className="flex flex-wrap items-center justify-between gap-2 mt-4 px-4 py-2 bg-white rounded-lg border">
          <div className="flex items-center gap-2">
            <span className="text-sm">Tampilkan</span>
            <select className="border rounded px-2 py-1 text-sm" value={rows} onChange={e => { setRows(e.target.value === 'all' ? total : Number(e.target.value)); setPage(1); }}>
              <option value={10}>10</option><option value={25}>25</option><option value={50}>50</option><option value={100}>100</option><option value="all">Semua</option>
            </select>
            <span className="text-sm">dari {total} data</span>
          </div>
          <div className="flex items-center gap-2">
            <button onClick={() => setPage(page-1)} disabled={page===1} className="px-3 py-1 rounded bg-gray-200 disabled:opacity-50">Prev</button>
            <span>Halaman {page} dari {totalPages}</span>
            <button onClick={() => setPage(page+1)} disabled={page===totalPages} className="px-3 py-1 rounded bg-gray-200 disabled:opacity-50">Next</button>
          </div>
          <div className="flex items-center gap-2">
            <input type="number" min={1} max={totalPages} value={jump} onChange={e => setJump(e.target.value)} onKeyDown={e => e.key==='Enter' && setPage(Math.min(Math.max(1, parseInt(jump)), totalPages))} className="w-16 border rounded px-2 py-1 text-sm" placeholder="Hal" />
            <button onClick={() => setPage(Math.min(Math.max(1, parseInt(jump)), totalPages))} className="px-3 py-1 bg-blue-600 text-white rounded">Go</button>
          </div>
        </div>
      );
    };

    // ==================== LOGIN ====================
    const Login = ({ onLogin }) => {
      const [user, setUser] = useState('');
      const [pass, setPass] = useState('');
      const [loading, setLoading] = useState(false);
      const submit = async (e) => {
        e.preventDefault();
        setLoading(true);
        const res = await runGoogleScript('login', user, pass);
        if (res && res.success) onLogin(res.user);
        else Swal.fire('Gagal', 'Username atau password salah', 'error');
        setLoading(false);
      };
      return (
        <div className="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-900 to-slate-800 p-4">
          <div className="bg-white rounded-3xl shadow-2xl w-full max-w-5xl overflow-hidden flex flex-col md:flex-row">
            <div className="md:w-1/2 p-8">
              <div className="text-center md:text-left mb-6"><i className="fas fa-fingerprint text-5xl text-blue-600"></i><h2 className="text-3xl font-bold">Korwil Sine</h2><p className="text-gray-500">Monitoring Presensi</p></div>
              <form onSubmit={submit} className="space-y-4">
                <input type="text" placeholder="Username" required className="w-full p-3 border rounded-xl" value={user} onChange={e=>setUser(e.target.value)} />
                <input type="password" placeholder="Password" required className="w-full p-3 border rounded-xl" value={pass} onChange={e=>setPass(e.target.value)} />
                <button type="submit" disabled={loading} className="w-full bg-blue-600 text-white py-3 rounded-xl font-bold">{loading ? 'Memproses...' : 'MASUK'}</button>
              </form>
            </div>
            <div className="hidden md:flex md:w-1/2 bg-blue-700 text-white p-12 flex-col justify-center items-center">
              <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c8/Lambang_Kabupaten_Ngawi_%28svg%29.svg/1280px-Lambang_Kabupaten_Ngawi_%28svg%29.svg.png" className="w-48 mb-6" alt="logo" />
              <h3 className="text-3xl font-bold text-center">Monitoring Presensi Korwil Sine</h3>
              <p className="mt-2">Dinas Pendidikan Kabupaten Ngawi</p>
              <div className="mt-6 bg-white/20 rounded-full px-4 py-2"><i className="fas fa-calendar-alt mr-2"></i>{new Date().toLocaleDateString('id-ID')}</div>
            </div>
          </div>
        </div>
      );
    };

    // ==================== DASHBOARD PRESENSI (RINGKAS) ====================
    const Dashboard = ({ data, refresh, role, lembagaFilter }) => {
      const [filterLembaga, setFilterLembaga] = useState(lembagaFilter || '');
      const [filterNama, setFilterNama] = useState('');
      const [page, setPage] = useState(1);
      const [rows, setRows] = useState(10);
      const [editing, setEditing] = useState(null);
      const [editVal, setEditVal] = useState('');
      const [modalImg, setModalImg] = useState(null);
      const [modalMap, setModalMap] = useState(null);

      const canEditLembaga = ['Admin','User','Superuser'].includes(role);
      useEffect(() => { if (!canEditLembaga && lembagaFilter) setFilterLembaga(lembagaFilter); }, [canEditLembaga, lembagaFilter]);

      const filtered = useMemo(() => data.filter(i => i['Nama Lembaga']?.toLowerCase().includes(filterLembaga.toLowerCase()) && i['Nama Pegawai']?.toLowerCase().includes(filterNama.toLowerCase())), [data, filterLembaga, filterNama]);
      const total = filtered.length;
      const paginated = filtered.slice((page-1)*rows, page*rows);
      const stats = useMemo(() => {
        let datang=0, pulang=0, dalam=0, luar=0, psw=0, tidak=0;
        filtered.forEach(i => {
          const jns = (i['Jenis Presensi']||'').toLowerCase();
          const rad = (i.displayRadius || i['Keterangan Radius']||'').toLowerCase();
          if (jns.includes('datang')) datang++;
          if (jns.includes('pulang')) pulang++;
          if (rad.includes('luar radius')) luar++;
          else if (rad.includes('dalam radius')) dalam++;
          else if (rad === 'psw') psw++;
          else if (rad.includes('tidak hadir')||rad.includes('hari libur')) tidak++;
        });
        return { datang, pulang, dalam, luar, psw, tidak };
      }, [filtered]);

      const saveKet = async (idx) => {
        const res = await runGoogleScript('updateKeteranganBukti', idx, editVal);
        if (res.success) { Swal.fire({ icon:'success', title:'Tersimpan', timer:1000, showConfirmButton:false }); setEditing(null); refresh(); }
      };

      return (
        <div className="space-y-4">
          <div className="grid grid-cols-2 md:grid-cols-6 gap-3">
            <div className="bg-white p-3 rounded shadow"><i className="fas fa-sign-in-alt text-blue-500"></i><p className="text-lg font-bold">{stats.datang}</p><p className="text-xs">Datang</p></div>
            <div className="bg-white p-3 rounded shadow"><i className="fas fa-sign-out-alt text-yellow-500"></i><p className="text-lg font-bold">{stats.pulang}</p><p className="text-xs">Pulang</p></div>
            <div className="bg-white p-3 rounded shadow"><i className="fas fa-check-circle text-green-500"></i><p className="text-lg font-bold">{stats.dalam}</p><p className="text-xs">Dalam Radius</p></div>
            <div className="bg-white p-3 rounded shadow"><i className="fas fa-exclamation-triangle text-red-500"></i><p className="text-lg font-bold">{stats.luar}</p><p className="text-xs">Luar Radius</p></div>
            <div className="bg-white p-3 rounded shadow"><i className="fas fa-file-signature text-purple-500"></i><p className="text-lg font-bold">{stats.psw}</p><p className="text-xs">PSW</p></div>
            <div className="bg-white p-3 rounded shadow"><i className="fas fa-ban text-gray-500"></i><p className="text-lg font-bold">{stats.tidak}</p><p className="text-xs">Tidak Hadir</p></div>
          </div>
          <div className="bg-white p-4 rounded shadow flex flex-wrap gap-2">
            <input type="text" placeholder="Filter Lembaga" className="border p-2 rounded flex-1" value={filterLembaga} onChange={e=>canEditLembaga&&setFilterLembaga(e.target.value)} disabled={!canEditLembaga} />
            <input type="text" placeholder="Filter Nama" className="border p-2 rounded flex-1" value={filterNama} onChange={e=>setFilterNama(e.target.value)} />
          </div>
          <div className="bg-white rounded shadow overflow-x-auto">
            <table className="min-w-full text-sm">
              <thead className="bg-gray-800 text-white"><tr><th className="p-2">Waktu</th><th className="p-2">Lembaga</th><th className="p-2">Pegawai</th><th className="p-2">Bukti</th><th className="p-2">Radius</th><th className="p-2">Ket Bukti</th></tr></thead>
              <tbody>
                {paginated.map((item,i) => {
                  let bg = '';
                  if (item.isPSW) bg = 'bg-psw';
                  else if (isTdkHadir(item.displayRadius)) bg = 'bg-black text-white';
                  else if (isOutside(item.displayRadius)) bg = 'bg-outside';
                  else if (checkLate(item['Waktu'], item['Jenis Presensi'])) bg = 'bg-late';
                  return (
                    <tr key={i} className={bg}>
                      <td className="p-2">{item['Waktu']}<br/><span className="text-xs">{item['Jenis Presensi']}</span></td>
                      <td className="p-2">{item['Nama Lembaga']}</td>
                      <td className="p-2"><b>{item['Nama Pegawai']}</b><br/>{item['Nip']}</td>
                      <td className="p-2 text-center">
                        <button onClick={()=>setModalImg(item['Bukti Dukung'])} className="bg-blue-100 p-1 rounded"><i className="fas fa-image"></i></button>
                        <button onClick={()=>setModalMap({lat:item.Latitude, lng:item.Longitude})} className="bg-green-100 p-1 rounded ml-1"><i className="fas fa-map-marker-alt"></i></button>
                      </td>
                      <td className="p-2"><span className="px-1 py-0.5 rounded text-white bg-green-600">{item.displayRadius}</span><br/>{item['Jarak Absen']}</td>
                      <td className="p-2">
                        {editing === item._rowIndex ? (
                          <div className="flex gap-1"><input className="border p-1 text-xs" value={editVal} onChange={e=>setEditVal(e.target.value)} autoFocus /><button onClick={()=>saveKet(item._rowIndex)} className="bg-green-600 text-white px-2 rounded">Simpan</button></div>
                        ) : (
                          <div className="cursor-pointer" onClick={()=>{setEditing(item._rowIndex); setEditVal(item['Keterangan Bukti']||'');}}>{item['Keterangan Bukti']||'-'} <i className="fas fa-pen text-gray-400"></i></div>
                        )}
                      </td>
                    </tr>
                  );
                })}
                {paginated.length===0 && <tr><td colSpan="6" className="text-center p-4">Tidak ada data</td></tr>}
              </tbody>
            </table>
            <Pagination page={page} total={total} rows={rows} setPage={setPage} setRows={setRows} />
          </div>
          {modalImg && <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50" onClick={()=>setModalImg(null)}><div className="bg-white rounded max-w-4xl w-full" onClick={e=>e.stopPropagation()}><div className="p-2 bg-gray-800 text-white flex justify-between"><span>Bukti Dukung</span><button onClick={()=>setModalImg(null)}>&times;</button></div><div className="p-4 h-[70vh] flex items-center justify-center">{modalImg.includes('drive.google.com') ? <iframe src={`https://drive.google.com/file/d/${extractFileIdFromDriveUrl(modalImg)}/preview`} className="w-full h-full" /> : <img src={modalImg} className="max-h-full max-w-full" />}</div></div></div>}
          {modalMap && <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50" onClick={()=>setModalMap(null)}><div className="bg-white rounded max-w-3xl w-full" onClick={e=>e.stopPropagation()}><div className="p-2 bg-gray-800 text-white flex justify-between"><span>Lokasi</span><button onClick={()=>setModalMap(null)}>&times;</button></div><iframe width="100%" height="400" src={`https://maps.google.com/maps?q=${modalMap.lat},${modalMap.lng}&z=16&output=embed`}></iframe></div></div>}
        </div>
      );
    };

    // ==================== KOMPONEN DOKUMEN IJIN (RINGKAS) ====================
    const DokumenIjin = ({ data, refresh, role, lembagaFilter }) => {
      const [filterLembaga, setFilterLembaga] = useState(lembagaFilter || '');
      const [filterNama, setFilterNama] = useState('');
      const [page, setPage] = useState(1);
      const [rows, setRows] = useState(10);
      const [editRow, setEditRow] = useState(null);
      const [status, setStatus] = useState('');
      const [ket, setKet] = useState('');
      const [pdfUrl, setPdfUrl] = useState(null);
      const canEdit = ['Admin','User','Superuser'].includes(role);
      useEffect(() => { if (!canEdit && lembagaFilter) setFilterLembaga(lembagaFilter); }, [canEdit, lembagaFilter]);
      const filtered = useMemo(() => data.filter(i => i['Nama Lembaga']?.toLowerCase().includes(filterLembaga.toLowerCase()) && i['Nama Pegawai']?.toLowerCase().includes(filterNama.toLowerCase())), [data, filterLembaga, filterNama]);
      const paginated = filtered.slice((page-1)*rows, page*rows);
      const save = async (idx) => { const res = await runGoogleScript('updateDokumenIjin', idx, status, ket); if (res.success) { Swal.fire({ icon:'success', title:'Tersimpan', timer:1000 }); setEditRow(null); refresh(); } };
      const hapus = async (idx, nama) => { if (await Swal.fire({ title:'Hapus?', text:`Hapus ${nama}?`, icon:'warning', showCancelButton:true }).then(r=>r.isConfirmed)) { const res = await runGoogleScript('deleteDokumenIjin', idx); if (res.success) { Swal.fire('Terhapus','','success'); refresh(); } } };
      return (
        <div className="space-y-4">
          <div className="bg-white p-4 rounded shadow flex gap-2"><input type="text" placeholder="Filter Lembaga" className="border p-2 rounded flex-1" value={filterLembaga} onChange={e=>setFilterLembaga(e.target.value)} disabled={!canEdit} /><input type="text" placeholder="Filter Nama" className="border p-2 rounded flex-1" value={filterNama} onChange={e=>setFilterNama(e.target.value)} /></div>
          <div className="bg-white rounded shadow overflow-x-auto">
            <table className="min-w-full text-sm"><thead className="bg-gray-800 text-white"><tr><th className="p-2">Pegawai</th><th className="p-2">Jenis</th><th className="p-2">Tgl Awal</th><th className="p-2">Tgl Akhir</th><th className="p-2">File</th><th className="p-2">Status</th><th className="p-2">Keterangan</th>{canEdit && <th className="p-2">Aksi</th>}</tr></thead>
            <tbody>{paginated.map((item,i)=> (<tr key={i}><td className="p-2"><b>{item['Nama Pegawai']}</b><br/>{item['Nama Lembaga']}</td><td className="p-2">{item['Jenis Ijin']}</td><td className="p-2">{item['Tanggal Awal']}</td><td className="p-2">{item['Tanggal Berakir']}</td><td className="p-2 text-center"><button onClick={()=>setPdfUrl(item['File URL'])} className="bg-red-600 text-white px-2 py-1 rounded text-xs"><i className="fas fa-file-pdf"></i> PDF</button></td><td className="p-2">{editRow===item._rowIndex ? <select value={status} onChange={e=>setStatus(e.target.value)} className="border p-1 text-xs"><option value="Diajukan">Diajukan</option><option value="DiSetujui">Disetujui</option><option value="Ditolak">Ditolak</option></select> : <span className={`px-1 py-0.5 rounded text-white ${item.Status==='DiSetujui'?'bg-green-600':item.Status==='Ditolak'?'bg-red-600':'bg-blue-600'}`}>{item.Status||'Diajukan'}</span>}</td><td className="p-2">{editRow===item._rowIndex ? <input value={ket} onChange={e=>setKet(e.target.value)} className="border p-1 text-xs" /> : item.Keterangan||'-'}</td>{canEdit && <td className="p-2">{editRow===item._rowIndex ? <button onClick={()=>save(item._rowIndex)} className="bg-green-600 text-white px-2 py-1 rounded"><i className="fas fa-save"></i></button> : <><button onClick={()=>{setEditRow(item._rowIndex); setStatus(item.Status); setKet(item.Keterangan);}} className="text-blue-600 mr-1"><i className="fas fa-edit"></i></button><button onClick={()=>hapus(item._rowIndex, item['Nama Pegawai'])} className="text-red-600"><i className="fas fa-trash"></i></button></>}</td>}</tr>))}</tbody></table>
            <Pagination page={page} total={filtered.length} rows={rows} setPage={setPage} setRows={setRows} />
          </div>
          {pdfUrl && <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50" onClick={()=>setPdfUrl(null)}><div className="bg-white rounded w-full max-w-4xl h-[80vh]" onClick={e=>e.stopPropagation()}><div className="p-2 bg-gray-800 text-white flex justify-between"><span>PDF</span><button onClick={()=>setPdfUrl(null)}>&times;</button></div><iframe src={pdfUrl.replace('/view','/preview')} className="w-full h-full" /></div></div>}
        </div>
      );
    };

    // ==================== DATABASE PEGAWAI (RINGKAS) ====================
    const DatabasePegawai = ({ refreshParent, role }) => {
      const [data, setData] = useState([]);
      const [filterLembaga, setFilterLembaga] = useState('');
      const [filterNama, setFilterNama] = useState('');
      const [modal, setModal] = useState(false);
      const [editRow, setEditRow] = useState(null);
      const [form, setForm] = useState({ 'Username (MP/ID)':'','Password':'','Name Lembaga':'','Name Pegawai':'','Latitude':'','Longitude':'','Radius (m)':'','Role':'' });
      const [page, setPage] = useState(1);
      const [rows, setRows] = useState(10);
      const canManage = ['Admin','Superuser'].includes(role);
      const fetchData = async () => { const res = await runGoogleScript('getPegawai'); setData(res || []); };
      useEffect(() => { fetchData(); }, []);
      const filtered = useMemo(() => data.filter(i => i['Name Lembaga']?.toLowerCase().includes(filterLembaga.toLowerCase()) && i['Name Pegawai']?.toLowerCase().includes(filterNama.toLowerCase())), [data, filterLembaga, filterNama]);
      const paginated = filtered.slice((page-1)*rows, page*rows);
      const openModal = (item=null) => { if (!canManage) return Swal.fire('Akses Ditolak','Hanya Admin/Superuser','warning'); if (item) { setForm(item); setEditRow(item._rowIndex); } else { setForm({ 'Username (MP/ID)':'','Password':'','Name Lembaga':'','Name Pegawai':'','Latitude':'','Longitude':'','Radius (m)':'','Role':'' }); setEditRow(null); } setModal(true); };
      const save = async () => { if (!form['Username (MP/ID)'] || !form['Password'] || !form['Name Pegawai']) return Swal.fire('Peringatan','Isi username, password, nama','warning'); let res; if (editRow) res = await runGoogleScript('updatePegawai', editRow, form); else res = await runGoogleScript('addPegawai', form); if (res.success) { Swal.fire({ icon:'success', title:'Tersimpan', timer:1500 }); setModal(false); fetchData(); if (refreshParent) refreshParent(); } else Swal.fire('Error','Gagal simpan','error'); };
      const hapus = async (idx, nama) => { if (!canManage) return; if (await Swal.fire({ title:'Hapus?', text:`Hapus ${nama}?`, icon:'warning', showCancelButton:true }).then(r=>r.isConfirmed)) { const res = await runGoogleScript('deletePegawai', idx); if (res.success) { Swal.fire('Terhapus','','success'); fetchData(); } } };
      return (
        <div className="space-y-4">
          <div className="bg-white p-4 rounded shadow flex justify-between"><h3 className="font-bold"><i className="fas fa-database"></i> Database Pegawai</h3>{canManage && <button onClick={()=>openModal()} className="bg-blue-600 text-white px-3 py-1 rounded"><i className="fas fa-plus"></i> Tambah</button>}</div>
          <div className="bg-white p-4 rounded shadow flex gap-2"><input placeholder="Lembaga" className="border p-2 rounded flex-1" value={filterLembaga} onChange={e=>setFilterLembaga(e.target.value)} /><input placeholder="Nama Pegawai" className="border p-2 rounded flex-1" value={filterNama} onChange={e=>setFilterNama(e.target.value)} /></div>
          <div className="bg-white rounded shadow overflow-x-auto"><table className="min-w-full text-sm"><thead className="bg-gray-800 text-white"><tr><th>Username</th><th>Password</th><th>Lembaga</th><th>Nama</th><th>Lat</th><th>Lng</th><th>Radius</th><th>Role</th>{canManage && <th>Aksi</th>}</tr></thead><tbody>{paginated.map((item,i)=><tr key={i}><td className="p-2">{item['Username (MP/ID)']}</td><td className="p-2">••••</td><td className="p-2">{item['Name Lembaga']}</td><td className="p-2"><b>{item['Name Pegawai']}</b></td><td className="p-2">{item['Latitude']}</td><td className="p-2">{item['Longitude']}</td><td className="p-2">{item['Radius (m)']}</td><td className="p-2"><span className="bg-blue-100 text-blue-800 px-1 rounded text-xs">{item['Role']}</span></td>{canManage && <td className="p-2"><button onClick={()=>openModal(item)} className="text-blue-600 mr-1"><i className="fas fa-edit"></i></button><button onClick={()=>hapus(item._rowIndex, item['Name Pegawai'])} className="text-red-600"><i className="fas fa-trash"></i></button></td>}</tr>)}</tbody></table><Pagination page={page} total={filtered.length} rows={rows} setPage={setPage} setRows={setRows} /></div>
          {modal && <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50" onClick={()=>setModal(false)}><div className="bg-white rounded max-w-2xl w-full max-h-[90vh] overflow-auto" onClick={e=>e.stopPropagation()}><div className="p-3 bg-gray-800 text-white flex justify-between"><span>{editRow ? 'Edit' : 'Tambah'} Pegawai</span><button onClick={()=>setModal(false)}>&times;</button></div><div className="p-4 grid grid-cols-2 gap-2"><input placeholder="Username (MP/ID)" className="border p-2 rounded" value={form['Username (MP/ID)']} onChange={e=>setForm({...form, 'Username (MP/ID)':e.target.value})} /><input placeholder="Password" className="border p-2 rounded" value={form['Password']} onChange={e=>setForm({...form, 'Password':e.target.value})} /><input placeholder="Nama Lembaga" className="border p-2 rounded" value={form['Name Lembaga']} onChange={e=>setForm({...form, 'Name Lembaga':e.target.value})} /><input placeholder="Nama Pegawai" className="border p-2 rounded" value={form['Name Pegawai']} onChange={e=>setForm({...form, 'Name Pegawai':e.target.value})} /><input placeholder="Latitude" className="border p-2 rounded" value={form['Latitude']} onChange={e=>setForm({...form, 'Latitude':e.target.value})} /><input placeholder="Longitude" className="border p-2 rounded" value={form['Longitude']} onChange={e=>setForm({...form, 'Longitude':e.target.value})} /><input placeholder="Radius (m)" className="border p-2 rounded" value={form['Radius (m)']} onChange={e=>setForm({...form, 'Radius (m)':e.target.value})} /><select className="border p-2 rounded" value={form['Role']} onChange={e=>setForm({...form, 'Role':e.target.value})}><option value="">Pilih Role</option><option value="Admin">Admin</option><option value="Superuser">Superuser</option><option value="User">User</option><option value="Supervisor">Supervisor</option></select></div><div className="p-3 flex justify-end gap-2"><button onClick={()=>setModal(false)} className="border px-4 py-2 rounded">Batal</button><button onClick={save} className="bg-blue-600 text-white px-4 py-2 rounded">Simpan</button></div></div></div>}
        </div>
      );
    };

    // ==================== MONITORING & EKSPOR ====================
    const Monitoring = ({ presensiData, refresh, role }) => {
      const [filterLembaga, setFilterLembaga] = useState('');
      const [start, setStart] = useState('');
      const [end, setEnd] = useState('');
      const isAdmin = role === 'Admin';
      const canExport = ['Admin','User','Superuser'].includes(role);
      const exportPDF = () => {
        let filtered = presensiData.filter(i => i['Nama Lembaga']?.toLowerCase().includes(filterLembaga.toLowerCase()));
        if (start && end) {
          const startNum = parseInt(start.replace(/-/g,'')), endNum = parseInt(end.replace(/-/g,''));
          filtered = filtered.filter(i => {
            const tgl = parsePresensiDate(i['Waktu']);
            if (!tgl) return false;
            const [dd,mm,yyyy] = tgl.split('/');
            const tglNum = parseInt(yyyy+mm+dd);
            return tglNum >= startNum && tglNum <= endNum;
          });
        }
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('l','mm','a4');
        doc.text('Laporan Presensi Korwil Sine', 14, 15);
        doc.text(`Dicetak: ${new Date().toLocaleString()}`, 14, 22);
        const tableData = filtered.map(i => [i['Waktu'], i['Nama Pegawai'], i['Nama Lembaga'], i['Jenis Presensi'], i.displayRadius || i['Keterangan Radius'], i['Keterangan Bukti']||'-']);
        doc.autoTable({ startY: 30, head: [['Waktu','Pegawai','Lembaga','Jenis','Radius','Ket']], body: tableData });
        doc.save(`presensi_${new Date().toISOString().slice(0,10)}.pdf`);
      };
      const resetData = async () => { if (await Swal.fire({ title:'Reset Data?', text:'Semua presensi akan dihapus permanen', icon:'warning', showCancelButton:true }).then(r=>r.isConfirmed)) { const res = await runGoogleScript('resetDataPresensi'); if (res.success) { Swal.fire('Berhasil','Data direset','success'); refresh(); } } };
      return (
        <div className="bg-white p-6 rounded shadow space-y-4">
          <h3 className="font-bold text-xl"><i className="fas fa-file-export"></i> Manajemen Data</h3>
          {canExport && <div className="border p-4 rounded"><h4 className="font-bold">Ekspor PDF</h4><div className="flex gap-2 mt-2"><input placeholder="Lembaga" className="border p-2 rounded flex-1" value={filterLembaga} onChange={e=>setFilterLembaga(e.target.value)} /><input type="date" className="border p-2 rounded" value={start} onChange={e=>setStart(e.target.value)} /><span>s.d.</span><input type="date" className="border p-2 rounded" value={end} onChange={e=>setEnd(e.target.value)} /></div><button onClick={exportPDF} className="mt-2 bg-blue-600 text-white px-4 py-2 rounded"><i className="fas fa-file-pdf"></i> Unduh PDF</button></div>}
          {isAdmin && <div className="border border-red-300 p-4 rounded bg-red-50"><h4 className="font-bold text-red-700">Zona Berbahaya</h4><button onClick={resetData} className="mt-2 bg-red-600 text-white px-4 py-2 rounded"><i className="fas fa-trash"></i> Reset Semua Data Presensi</button></div>}
        </div>
      );
    };

    // ==================== LOG AKTIVITAS (ADMIN ONLY) ====================
    const ActivityLog = ({ role }) => {
      const [logs, setLogs] = useState([]);
      const [filterUser, setFilterUser] = useState('');
      const [filterAct, setFilterAct] = useState('');
      const [page, setPage] = useState(1);
      const [rows, setRows] = useState(10);
      useEffect(() => { if (role === 'Admin') runGoogleScript('getActivityLogs').then(setLogs); }, [role]);
      if (role !== 'Admin') return <div className="bg-white p-8 text-center"><i className="fas fa-lock text-6xl"></i><p>Akses ditolak. Hanya Admin.</p></div>;
      const filtered = logs.filter(l => (l.Username||'').toLowerCase().includes(filterUser.toLowerCase()) && (l.Action||'').toLowerCase().includes(filterAct.toLowerCase()));
      const paginated = filtered.slice((page-1)*rows, page*rows);
      return (
        <div className="space-y-4">
          <div className="bg-white p-4 rounded shadow flex gap-2"><input placeholder="Username" className="border p-2 rounded flex-1" value={filterUser} onChange={e=>setFilterUser(e.target.value)} /><input placeholder="Aksi" className="border p-2 rounded flex-1" value={filterAct} onChange={e=>setFilterAct(e.target.value)} /></div>
          <div className="bg-white rounded shadow overflow-x-auto"><table className="min-w-full text-sm"><thead className="bg-gray-800 text-white"><tr><th className="p-2">Timestamp</th><th className="p-2">Username</th><th className="p-2">Role</th><th className="p-2">Action</th><th className="p-2">Details</th></tr></thead><tbody>{paginated.map((log,i)=><tr key={i}><td className="p-2">{log.Timestamp ? new Date(log.Timestamp).toLocaleString() : '-'}</td><td className="p-2">{log.Username}</td><td className="p-2">{log.Role}</td><td className="p-2">{log.Action}</td><td className="p-2">{log.Details}</td></tr>)}</tbody></table><Pagination page={page} total={filtered.length} rows={rows} setPage={setPage} setRows={setRows} /></div>
        </div>
      );
    };

    // ==================== PENGAJUAN PSW ====================
    const PengajuanPSW = ({ user }) => {
      const [pegawai, setPegawai] = useState([]);
      const [form, setForm] = useState({ nip:'', jenis:'', tglAwal:'', tglAkhir:'' });
      const [file, setFile] = useState(null);
      const [loading, setLoading] = useState(false);
      useEffect(() => { if (user?.lembaga) runGoogleScript('getPegawaiByLembaga', user.lembaga).then(setPegawai); }, [user]);
      const handleFile = (e) => {
        const f = e.target.files[0];
        if (f && f.type === 'application/pdf' && f.size <= 5*1024*1024) {
          const reader = new FileReader();
          reader.onload = () => setFile({ name: f.name, base64: reader.result });
          reader.readAsDataURL(f);
        } else Swal.fire('Error','Hanya PDF maksimal 5MB','warning');
      };
      const submit = async (e) => {
        e.preventDefault();
        if (!file) return Swal.fire('Peringatan','Lampiran PDF wajib','warning');
        if (!form.nip) return Swal.fire('Peringatan','Pilih pegawai','warning');
        if (!form.jenis) return Swal.fire('Peringatan','Pilih kategori','warning');
        const selected = pegawai.find(p => p.nip === form.nip);
        if (!selected) return Swal.fire('Error','Data pegawai tidak ditemukan','error');
        setLoading(true);
        const payload = { lembaga: user.lembaga, namaPegawai: selected.nama, nip: selected.nip, jenis: form.jenis, tglAwal: form.tglAwal, tglAkhir: form.tglAkhir, fileName: file.name, fileBase64: file.base64 };
        const res = await runGoogleScript('submitPengajuan', payload);
        setLoading(false);
        if (res.success) { Swal.fire('Berhasil','Pengajuan terkirim','success'); setForm({ nip:'', jenis:'', tglAwal:'', tglAkhir:'' }); setFile(null); document.getElementById('fileInput').value = ''; }
        else Swal.fire('Gagal',res.message,'error');
      };
      return (
        <div className="bg-white p-6 rounded shadow"><h3 className="font-bold text-xl mb-4">Form Pengajuan PSW</h3><p>Lembaga: <b>{user?.lembaga}</b></p>
        <form onSubmit={submit} className="space-y-4 mt-4">
          <select required value={form.nip} onChange={e=>setForm({...form, nip:e.target.value})} className="w-full border p-2 rounded"><option value="">Pilih Pegawai</option>{pegawai.map(p=><option key={p.nip} value={p.nip}>{p.nama} (NIP: {p.nip})</option>)}</select>
          <div className="flex gap-4"><label className="flex items-center gap-2"><input type="radio" name="jenis" value="Sakit" onChange={e=>setForm({...form, jenis:e.target.value})} /> Sakit</label><label><input type="radio" name="jenis" value="Ijin" onChange={e=>setForm({...form, jenis:e.target.value})} /> Ijin</label><label><input type="radio" name="jenis" value="Dinas Luar" onChange={e=>setForm({...form, jenis:e.target.value})} /> Dinas Luar</label></div>
          <div className="flex gap-2"><input type="date" required placeholder="Tgl Mulai" className="border p-2 rounded flex-1" value={form.tglAwal} onChange={e=>setForm({...form, tglAwal:e.target.value})} /><input type="date" required placeholder="Tgl Selesai" className="border p-2 rounded flex-1" value={form.tglAkhir} onChange={e=>setForm({...form, tglAkhir:e.target.value})} /></div>
          <div className="border-2 border-dashed p-4 text-center"><input id="fileInput" type="file" accept=".pdf" onChange={handleFile} required />{file && <p className="text-green-600 mt-2">{file.name}</p>}</div>
          <button type="submit" disabled={loading} className="bg-blue-600 text-white px-6 py-2 rounded w-full">{loading ? 'Mengirim...' : 'Kirim Pengajuan'}</button>
        </form></div>
      );
    };

    // ==================== APP UTAMA ====================
    const App = () => {
      const [user, setUser] = useState(null);
      const [activeTab, setActiveTab] = useState('dashboard');
      const [presensi, setPresensi] = useState([]);
      const [ijin, setIjin] = useState([]);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);

      const fetchAll = async () => {
        if (!user) return;
        setLoading(true);
        setError(null);
        try {
          const [p, i] = await Promise.all([runGoogleScript('getPresensi'), runGoogleScript('getIjin')]);
          setPresensi(p || []);
          setIjin(i || []);
        } catch (e) { setError('Gagal mengambil data. Periksa koneksi.'); }
        setLoading(false);
      };
      useEffect(() => { if (user) fetchAll(); }, [user]);

      const enrichedPresensi = useMemo(() => enrichWithIjin(presensi, ijin), [presensi, ijin]);
      const canAccessPegawai = user && ['Admin','Superuser','User'].includes(user.role);
      const canEditAllLembaga = user && ['Admin','Superuser','User'].includes(user.role);
      const userLembaga = !canEditAllLembaga ? '' : (user?.lembaga || '');

      const tabs = [
        { id:'dashboard', icon:'fa-chart-pie', label:'Dashboard' },
        { id:'dokumen_ijin', icon:'fa-file-signature', label:'Dokumen Ijin' },
        { id:'pengajuan_psw', icon:'fa-file-upload', label:'Pengajuan PSW' },
        ...(canAccessPegawai ? [{ id:'pegawai', icon:'fa-users', label:'Database Pegawai' }] : []),
        { id:'monitoring', icon:'fa-desktop', label:'Monitoring' },
        { id:'activity', icon:'fa-history', label:'Log Aktivitas' }
      ];

      if (!user) return <Login onLogin={setUser} />;

      return (
        <div className="min-h-screen flex flex-col md:flex-row">
          {/* Sidebar */}
          <div className="w-full md:w-72 bg-slate-900 text-white">
            <div className="p-6 border-b border-slate-800 flex items-center gap-3">
              <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c8/Lambang_Kabupaten_Ngawi_%28svg%29.svg/1280px-Lambang_Kabupaten_Ngawi_%28svg%29.svg.png" className="w-10 h-10 rounded-full" alt="logo" />
              <div><div className="font-bold">KORWIL SINE</div><div className="text-xs text-blue-400">Monitoring</div></div>
            </div>
            <nav className="p-4 space-y-2">
              {tabs.map(tab => (
                <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg transition ${activeTab === tab.id ? 'bg-blue-600' : 'hover:bg-slate-800'}`}>
                  <i className={`fas ${tab.icon}`}></i> {tab.label}
                </button>
              ))}
            </nav>
            <div className="p-6 border-t border-slate-800">
              <div className="flex items-center gap-3 mb-4"><div className="w-8 h-8 rounded-full bg-slate-700 flex items-center justify-center">{user.nama.charAt(0)}</div><div><div className="text-sm font-bold">{user.nama}</div><div className="text-xs text-blue-400">{user.role}</div>{userLembaga && <div className="text-xs">{userLembaga}</div>}</div></div>
              <button onClick={() => setUser(null)} className="w-full bg-red-600/20 hover:bg-red-600 text-red-500 hover:text-white py-2 rounded transition">Logout</button>
            </div>
          </div>
          {/* Main Content */}
          <div className="flex-1 flex flex-col h-screen overflow-hidden">
            <header className="bg-white shadow-sm p-4 flex justify-between items-center">
              <h2 className="text-xl font-bold capitalize">{activeTab.replace('_',' ')}</h2>
              <button onClick={fetchAll} className="p-2 rounded-full hover:bg-gray-100"><i className={`fas fa-sync-alt ${loading ? 'fa-spin' : ''}`}></i></button>
            </header>
            <div className="flex-1 overflow-auto p-4">
              {error && <div className="bg-red-100 text-red-700 p-3 rounded mb-4">{error}</div>}
              {loading && !presensi.length && activeTab !== 'pegawai' ? (
                <div className="flex justify-center items-center h-64"><div className="loader w-12 h-12 rounded-full border-4 border-blue-200 border-t-blue-600 animate-spin"></div></div>
              ) : (
                <>
                  {activeTab === 'dashboard' && <Dashboard data={enrichedPresensi} refresh={fetchAll} role={user.role} lembagaFilter={userLembaga} />}
                  {activeTab === 'dokumen_ijin' && <DokumenIjin data={ijin} refresh={fetchAll} role={user.role} lembagaFilter={userLembaga} />}
                  {activeTab === 'pengajuan_psw' && <PengajuanPSW user={user} />}
                  {activeTab === 'pegawai' && canAccessPegawai && <DatabasePegawai refreshParent={fetchAll} role={user.role} />}
                  {activeTab === 'monitoring' && <Monitoring presensiData={enrichedPresensi} refresh={fetchAll} role={user.role} />}
                  {activeTab === 'activity' && <ActivityLog role={user.role} />}
                </>
              )}
            </div>
          </div>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
