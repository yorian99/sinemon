<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monitoring Presensi Korwil Sine</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <!-- jsPDF & autoTable for PDF Export -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

  <style>
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    .loader { border-top-color: #3b82f6; animation: spinner 1.5s linear infinite; }
    @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .bg-late { background-color: #fef9c3 !important; }
    .bg-outside { background-color: #fee2e2 !important; }
    .bg-psw { background-color: #d1fae5 !important; }
    
    @keyframes slideInLeft {
      from { transform: translateX(-100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    .animate-slide-left { animation: slideInLeft 0.6s ease-out forwards; }
    .animate-slide-right { animation: slideInRight 0.6s ease-out forwards; }
  </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans antialiased">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // ==================== KOMUNIKASI DENGAN BACKEND GOOGLE APPS SCRIPT ====================
    const BACKEND_URL = 'https://script.google.com/macros/s/AKfycbyjzVmFk2YosZLXEsSdAdDy0Y_2Qw6tGH-23Mj-94zmS7t9_sLfn2SHEUznbojwpyI-/exec';
    
    // Helper untuk mengirim request ke backend via fetch (CORS)
    // Menggantikan google.script.run agar bisa dihosting di GitHub Pages
    const runGoogleScript = async (funcName, ...args) => {
      try {
        const response = await fetch(BACKEND_URL, {
          method: 'POST',
          mode: 'cors',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            function: funcName,
            arguments: args
          })
        });
        
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }
        
        const data = await response.json();
        
        // Jika backend mengembalikan error dalam respons
        if (data.error) {
          throw new Error(data.error);
        }
        
        // Kembalikan hasil eksekusi fungsi dari backend
        return data.result;
      } catch (err) {
        console.error(`Error calling ${funcName}:`, err);
        
        // Menentukan fallback yang sesuai agar komponen tidak crash
        // (meniru perilaku original yang tidak selalu menangani reject)
        if (funcName === 'login') {
          return { success: false, message: err.message };
        }
        // Fungsi-fungsi yang diharapkan mengembalikan array
        if (['getPresensi', 'getIjin', 'getPegawai', 'getActivityLogs', 'getPegawaiByLembaga'].includes(funcName)) {
          return [];
        }
        // Fungsi-fungsi yang diharapkan mengembalikan object dengan properti success
        if (['updateKeteranganBukti', 'deletePresensi', 'addPresensi', 'updatePresensi', 
             'setStatusRentang', 'updateDokumenIjin', 'deleteDokumenIjin', 
             'addPegawai', 'updatePegawai', 'deletePegawai', 'resetDataPresensi', 
             'submitPengajuan'].includes(funcName)) {
          return { success: false, message: err.message };
        }
        
        // Default fallback: return null
        return null;
      }
    };

    // Fungsi untuk mengekstrak file ID dari URL Google Drive
    const extractFileIdFromDriveUrl = (url) => {
      if (!url) return null;
      let match = url.match(/\/file\/d\/([^\/]+)/);
      if (match) return match[1];
      match = url.match(/[?&]id=([^&]+)/);
      if (match) return match[1];
      match = url.match(/\/d\/([^\/]+)\/preview/);
      if (match) return match[1];
      return null;
    };

    // Logika Penentuan Terlambat (Datang > 07:30)
    const checkLateStatus = (waktuStr, jenisPresensi) => {
      if (!waktuStr || !jenisPresensi || jenisPresensi.toLowerCase() !== 'datang') return false;
      try {
        const parts = waktuStr.split('pukul ');
        if (parts.length < 2) return false;
        const timeString = parts[1].trim();
        const [hh, mm] = timeString.split(/[\.\:]/);
        const hours = parseInt(hh, 10);
        const mins = parseInt(mm, 10);
        const totalMinutes = (hours * 60) + mins;
        return totalMinutes > 450;
      } catch (e) {
        return false;
      }
    };

    const isOutsideRadius = (ketRadius) => {
      return ketRadius && ketRadius.toLowerCase().includes('luar radius');
    };

    const isTidakHadir = (ketRadius) => {
      return ketRadius && (ketRadius.toLowerCase().includes('tidak hadir') || ketRadius.toLowerCase().includes('hari libur'));
    };

    const normalizeName = (name) => {
      if (!name) return '';
      return name.replace(/[^a-zA-Z0-9]/g, '').toLowerCase();
    };

    const parsePresensiDate = (waktuStr) => {
      if (!waktuStr) return null;
      const parts = waktuStr.split('pukul')[0].trim();
      const dateParts = parts.split(', ')[1];
      if (!dateParts) return null;
      const [day, monthName, year] = dateParts.split(' ');
      const monthMap = {
        'Januari': 1, 'Februari': 2, 'Maret': 3, 'April': 4, 'Mei': 5, 'Juni': 6,
        'Juli': 7, 'Agustus': 8, 'September': 9, 'Oktober': 10, 'November': 11, 'Desember': 12
      };
      const month = monthMap[monthName];
      if (!month) return null;
      return `${day.padStart(2, '0')}/${month.toString().padStart(2, '0')}/${year}`;
    };

    const dateToNumber = (dateStr) => {
      if (!dateStr) return null;
      const [dd, mm, yyyy] = dateStr.split('/').map(Number);
      if (!dd || !mm || !yyyy) return null;
      return yyyy * 10000 + mm * 100 + dd;
    };

    const isDateInRangeNum = (dateStr, startNum, endNum) => {
      const dateNum = dateToNumber(dateStr);
      if (dateNum === null) return false;
      return dateNum >= startNum && dateNum <= endNum;
    };

    const parseIjinDate = (dateStr) => {
      if (!dateStr) return null;
      const [year, month, day] = dateStr.split('-');
      if (!year || !month || !day) return null;
      return `${day.padStart(2, '0')}/${month.padStart(2, '0')}/${year}`;
    };

    const isDateInRange = (dateStr, startStr, endStr) => {
      if (!dateStr || !startStr || !endStr) return false;
      const toNum = (d) => {
        const [dd, mm, yyyy] = d.split('/').map(Number);
        return yyyy * 10000 + mm * 100 + dd;
      };
      const dateNum = toNum(dateStr);
      const startNum = toNum(startStr);
      const endNum = toNum(endStr);
      return dateNum >= startNum && dateNum <= endNum;
    };

    const enrichPresensiWithIjin = (presensi, ijin) => {
      if (!presensi || !ijin) return presensi;
      const approvedIjin = ijin.filter(item => item.Status && item.Status.toLowerCase() === 'disetujui');
      return presensi.map(p => {
        const psw = approvedIjin.some(item => {
          const namaPegawaiPresensi = normalizeName(p['Nama Pegawai'] || '');
          const namaPegawaiIjin = normalizeName(item['Nama Pegawai'] || '');
          if (namaPegawaiPresensi !== namaPegawaiIjin) return false;
          const presensiDate = parsePresensiDate(p['Waktu']);
          if (!presensiDate) return false;
          const startDate = parseIjinDate(item['Tanggal Awal']);
          const endDate = parseIjinDate(item['Tanggal Berakir']);
          if (!startDate || !endDate) return false;
          return isDateInRange(presensiDate, startDate, endDate);
        });
        if (psw) {
          return { ...p, isPSW: true, displayRadius: 'PSW' };
        } else {
          return { ...p, isPSW: false, displayRadius: p['Keterangan Radius'] };
        }
      });
    };

    // ========== KOMPONEN PAGINATION ==========
    const TablePagination = ({ currentPage, totalItems, rowsPerPage, onPageChange, onRowsPerPageChange }) => {
      const totalPages = Math.ceil(totalItems / rowsPerPage) || 1;
      const [jumpInput, setJumpInput] = useState('');

      const handleJump = () => {
        let pageNum = parseInt(jumpInput, 10);
        if (isNaN(pageNum)) pageNum = 1;
        if (pageNum < 1) pageNum = 1;
        if (pageNum > totalPages) pageNum = totalPages;
        onPageChange(pageNum);
        setJumpInput('');
      };

      return (
        <div className="flex flex-col sm:flex-row items-center justify-between mt-4 px-4 py-3 bg-white rounded-lg shadow-sm border gap-3">
          <div className="flex items-center gap-2">
            <span className="text-sm text-slate-600">Tampilkan</span>
            <select
              className="border rounded-lg px-2 py-1 text-sm"
              value={rowsPerPage}
              onChange={(e) => {
                const val = e.target.value === 'all' ? totalItems : Number(e.target.value);
                onRowsPerPageChange(val);
                onPageChange(1);
              }}
            >
              <option value={10}>10</option>
              <option value={25}>25</option>
              <option value={50}>50</option>
              <option value={100}>100</option>
              <option value="all">Semua</option>
            </select>
            <span className="text-sm text-slate-600">dari {totalItems} data</span>
          </div>
          <div className="flex items-center gap-2">
            <button onClick={() => onPageChange(currentPage - 1)} disabled={currentPage === 1} className={`px-3 py-1 rounded-lg text-sm font-medium ${currentPage === 1 ? 'bg-slate-100 text-slate-400 cursor-not-allowed' : 'bg-slate-200 text-slate-700 hover:bg-slate-300'}`}>Previous</button>
            <span className="text-sm text-slate-700">Halaman {currentPage} dari {totalPages}</span>
            <button onClick={() => onPageChange(currentPage + 1)} disabled={currentPage === totalPages || totalPages === 0} className={`px-3 py-1 rounded-lg text-sm font-medium ${currentPage === totalPages || totalPages === 0 ? 'bg-slate-100 text-slate-400 cursor-not-allowed' : 'bg-slate-200 text-slate-700 hover:bg-slate-300'}`}>Next</button>
          </div>
          <div className="flex items-center gap-2">
            <input type="number" min="1" max={totalPages} value={jumpInput} onChange={(e) => setJumpInput(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && handleJump()} className="w-16 border rounded-lg px-2 py-1 text-sm text-center" placeholder="Halaman" />
            <button onClick={handleJump} className="px-3 py-1 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 transition">Go</button>
          </div>
        </div>
      );
    };

    // ========== KOMPONEN LOGIN ==========
    const Login = ({ onLogin }) => {
      const [username, setUsername] = useState('');
      const [password, setPassword] = useState('');
      const [loading, setLoading] = useState(false);

      const handleSubmit = async (e) => {
        e.preventDefault();
        setLoading(true);
        const res = await runGoogleScript('login', username, password);
        if (res && res.success) onLogin(res.user);
        else Swal.fire('Error', 'Username atau password salah!', 'error');
        setLoading(false);
      };

      return (
        <div className="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-900 to-slate-800 px-4">
          <div className="bg-white rounded-3xl shadow-2xl w-full max-w-5xl overflow-hidden flex flex-col md:flex-row">
            <div className="md:w-1/2 p-8 lg:p-12 flex flex-col justify-center animate-slide-left">
              <div className="mb-8 text-center md:text-left">
                <div className="w-20 h-20 bg-blue-100 rounded-2xl flex items-center justify-center mx-auto md:mx-0 mb-4 shadow-lg"><i className="fas fa-fingerprint text-5xl text-blue-600"></i></div>
                <h2 className="text-3xl font-black text-slate-800">Korwil Sine</h2>
                <p className="text-slate-500 text-sm">Sistem Monitoring Presensi</p>
              </div>
              <form onSubmit={handleSubmit} className="space-y-5">
                <div>
                  <label className="block text-xs font-bold uppercase text-slate-400 mb-1">Username</label>
                  <input type="text" required className="w-full px-5 py-4 border-2 border-slate-200 rounded-xl focus:ring-4 focus:ring-blue-200 focus:border-blue-600 outline-none transition" placeholder="Masukkan username" value={username} onChange={e => setUsername(e.target.value)} />
                </div>
                <div>
                  <label className="block text-xs font-bold uppercase text-slate-400 mb-1">Password</label>
                  <input type="password" required className="w-full px-5 py-4 border-2 border-slate-200 rounded-xl focus:ring-4 focus:ring-blue-200 focus:border-blue-600 outline-none transition" placeholder="********" value={password} onChange={e => setPassword(e.target.value)} />
                </div>
                <button type="submit" disabled={loading} className="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-xl font-black shadow-lg transition disabled:opacity-50 text-lg tracking-wider">{loading ? 'Memproses...' : 'MASUK'}</button>
              </form>
            </div>
            <div className="hidden md:flex md:w-1/2 bg-gradient-to-br from-blue-600 to-indigo-800 p-12 flex-col justify-center items-center text-white animate-slide-right">
              <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c8/Lambang_Kabupaten_Ngawi_%28svg%29.svg/1280px-Lambang_Kabupaten_Ngawi_%28svg%29.svg.png" alt="Logo Ngawi" className="w-48 h-48 object-contain mb-8 drop-shadow-2xl" onError={(e) => { e.target.onerror = null; e.target.src = 'https://via.placeholder.com/200?text=Logo'; }} />
              <h3 className="text-4xl font-black text-center leading-tight">Monitoring Presensi Korwil Sine</h3>
              <p className="text-lg text-center mt-4 text-blue-100">Dinas Pendidikan Kabupaten Ngawi</p>
              <div className="mt-8 flex gap-4 text-sm bg-white/20 py-3 px-6 rounded-full backdrop-blur-sm"><i className="fas fa-calendar-alt"></i><span>{new Date().toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' })}</span></div>
            </div>
          </div>
        </div>
      );
    };

    // ========== KOMPONEN DASHBOARD PRESENSI ==========
    const Dashboard = ({ data, refreshData, userRole, userLembaga }) => {
      const [filterLembaga, setFilterLembaga] = useState('');
      const [filterNama, setFilterNama] = useState('');
      const [editingRow, setEditingRow] = useState(null);
      const [editVal, setEditVal] = useState('');
      const [modalImg, setModalImg] = useState(null);
      const [modalMap, setModalMap] = useState(null);
      const [currentPage, setCurrentPage] = useState(1);
      const [rowsPerPage, setRowsPerPage] = useState(10);
      const [showRangeModal, setShowRangeModal] = useState(false);
      const [rangeStart, setRangeStart] = useState('');
      const [rangeEnd, setRangeEnd] = useState('');
      const [rangeStatus, setRangeStatus] = useState('Libur');
      const [rangeKeterangan, setRangeKeterangan] = useState('');
      
      // CRUD state
      const [showCRUDModal, setShowCRUDModal] = useState(false);
      const [crudMode, setCrudMode] = useState('add'); // 'add' or 'edit'
      const [currentRowIndex, setCurrentRowIndex] = useState(null);
      const [formValues, setFormValues] = useState({
        'Hari Tanggal': '',
        'Waktu': '',
        'Jenis Presensi': '',
        'Nama Lembaga': '',
        'Nama Pegawai': '',
        'Nip': '',
        'Bukti Dukung': '',
        'Latitude': '',
        'Longitude': '',
        'Jarak Absen': '',
        'Keterangan Radius': '',
        'Keterangan Bukti': ''
      });

      const canEditLembaga = userRole === 'Admin' || userRole === 'User' || userRole === 'Superuser';
      const canManageLibur = userRole === 'Admin' || userRole === 'Superuser';
      const canViewBukti = userRole === 'Admin' || userRole === 'User' || userRole === 'Superuser';
      const isAdmin = userRole === 'Admin';

      useEffect(() => {
        if (!canEditLembaga && userLembaga) setFilterLembaga(userLembaga);
      }, [canEditLembaga, userLembaga]);

      const filtered = useMemo(() => data.filter(i => (i['Nama Lembaga'] || '').toLowerCase().includes(filterLembaga.toLowerCase()) && (i['Nama Pegawai'] || '').toLowerCase().includes(filterNama.toLowerCase())), [data, filterLembaga, filterNama]);
      useEffect(() => setCurrentPage(1), [filterLembaga, filterNama]);
      const totalItems = filtered.length;
      useEffect(() => { if (rowsPerPage > totalItems && totalItems > 0) setRowsPerPage(totalItems); else if (totalItems === 0) setRowsPerPage(10); }, [totalItems, rowsPerPage]);
      const effectiveRowsPerPage = rowsPerPage === totalItems ? totalItems : rowsPerPage;
      const paginatedData = filtered.slice((currentPage - 1) * effectiveRowsPerPage, currentPage * effectiveRowsPerPage);

      const stats = useMemo(() => {
        let datang = 0, pulang = 0, dalamRadius = 0, luarRadius = 0, psw = 0, tidakHadir = 0;
        filtered.forEach(item => {
          const jenis = (item['Jenis Presensi'] || '').toLowerCase();
          const radius = (item.displayRadius || item['Keterangan Radius'] || '').toLowerCase();
          if (jenis.includes('datang')) datang++;
          if (jenis.includes('pulang')) pulang++;
          if (radius.includes('luar radius')) luarRadius++;
          else if (radius.includes('dalam radius')) dalamRadius++;
          else if (radius === 'psw') psw++;
          else if (radius.includes('tidak hadir') || radius.includes('hari libur')) tidakHadir++;
        });
        return { datang, pulang, dalamRadius, luarRadius, psw, tidakHadir };
      }, [filtered]);

      const handleSaveKet = async (idx) => {
        const res = await runGoogleScript('updateKeteranganBukti', idx, editVal);
        if (res.success) { Swal.fire({ icon: 'success', title: 'Tersimpan', timer: 1000, showConfirmButton: false }); setEditingRow(null); refreshData(); }
      };

      // CRUD Handlers
      const openAddModal = () => {
        setCrudMode('add');
        setCurrentRowIndex(null);
        setFormValues({
          'Hari Tanggal': '',
          'Waktu': '',
          'Jenis Presensi': '',
          'Nama Lembaga': '',
          'Nama Pegawai': '',
          'Nip': '',
          'Bukti Dukung': '',
          'Latitude': '',
          'Longitude': '',
          'Jarak Absen': '',
          'Keterangan Radius': '',
          'Keterangan Bukti': ''
        });
        setShowCRUDModal(true);
      };

      const openEditModal = (item) => {
        setCrudMode('edit');
        setCurrentRowIndex(item._rowIndex);
        setFormValues({
          'Hari Tanggal': item['Hari Tanggal'] || '',
          'Waktu': item['Waktu'] || '',
          'Jenis Presensi': item['Jenis Presensi'] || '',
          'Nama Lembaga': item['Nama Lembaga'] || '',
          'Nama Pegawai': item['Nama Pegawai'] || '',
          'Nip': item['Nip'] || '',
          'Bukti Dukung': item['Bukti Dukung'] || '',
          'Latitude': item['Latitude'] || '',
          'Longitude': item['Longitude'] || '',
          'Jarak Absen': item['Jarak Absen'] || '',
          'Keterangan Radius': item['Keterangan Radius'] || '',
          'Keterangan Bukti': item['Keterangan Bukti'] || ''
        });
        setShowCRUDModal(true);
      };

      const handleDelete = async (rowIndex, namaPegawai) => {
        const confirm = await Swal.fire({
          title: 'Hapus Presensi?',
          text: `Yakin ingin menghapus data presensi ${namaPegawai}?`,
          icon: 'warning',
          showCancelButton: true,
          confirmButtonColor: '#d33',
          cancelButtonColor: '#334155',
          confirmButtonText: 'Ya, Hapus'
        });
        if (confirm.isConfirmed) {
          const loading = Swal.fire({ title: 'Menghapus...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
          const res = await runGoogleScript('deletePresensi', rowIndex);
          loading.close();
          if (res.success) {
            Swal.fire({ icon: 'success', title: 'Terhapus', timer: 1500, showConfirmButton: false });
            refreshData();
          } else {
            Swal.fire('Error', 'Gagal menghapus data', 'error');
          }
        }
      };

      const handleSubmitCRUD = async () => {
        // Validasi minimal
        if (!formValues['Waktu'] || !formValues['Jenis Presensi'] || !formValues['Nama Pegawai']) {
          Swal.fire('Peringatan', 'Waktu, Jenis Presensi, dan Nama Pegawai wajib diisi.', 'warning');
          return;
        }

        const loading = Swal.fire({ title: 'Menyimpan...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
        let res;
        if (crudMode === 'add') {
          res = await runGoogleScript('addPresensi', formValues);
        } else {
          res = await runGoogleScript('updatePresensi', currentRowIndex, formValues);
        }
        loading.close();
        if (res.success) {
          Swal.fire({ icon: 'success', title: crudMode === 'add' ? 'Data Ditambahkan' : 'Data Diperbarui', timer: 1500, showConfirmButton: false });
          setShowCRUDModal(false);
          refreshData();
        } else {
          Swal.fire('Error', 'Gagal menyimpan data', 'error');
        }
      };

      return (
        <div className="space-y-6">
          <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4">
            <div className="bg-white p-5 rounded-2xl shadow-sm border flex items-center gap-4"><div className="w-12 h-12 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center text-xl"><i className="fas fa-sign-in-alt"></i></div><div><p className="text-xs text-slate-500 font-bold uppercase">Absen Datang</p><p className="text-2xl font-black text-slate-800">{stats.datang}</p></div></div>
            <div className="bg-white p-5 rounded-2xl shadow-sm border flex items-center gap-4"><div className="w-12 h-12 rounded-full bg-yellow-100 text-yellow-600 flex items-center justify-center text-xl"><i className="fas fa-sign-out-alt"></i></div><div><p className="text-xs text-slate-500 font-bold uppercase">Absen Pulang</p><p className="text-2xl font-black text-slate-800">{stats.pulang}</p></div></div>
            <div className="bg-white p-5 rounded-2xl shadow-sm border flex items-center gap-4"><div className="w-12 h-12 rounded-full bg-emerald-100 text-emerald-600 flex items-center justify-center text-xl"><i className="fas fa-map-marker-alt"></i></div><div><p className="text-xs text-slate-500 font-bold uppercase">Dalam Radius</p><p className="text-2xl font-black text-slate-800">{stats.dalamRadius}</p></div></div>
            <div className="bg-white p-5 rounded-2xl shadow-sm border flex items-center gap-4"><div className="w-12 h-12 rounded-full bg-red-100 text-red-600 flex items-center justify-center text-xl"><i className="fas fa-exclamation-triangle"></i></div><div><p className="text-xs text-slate-500 font-bold uppercase">Luar Radius</p><p className="text-2xl font-black text-slate-800">{stats.luarRadius}</p></div></div>
            <div className="bg-white p-5 rounded-2xl shadow-sm border flex items-center gap-4"><div className="w-12 h-12 rounded-full bg-green-100 text-green-600 flex items-center justify-center text-xl"><i className="fas fa-check-circle"></i></div><div><p className="text-xs text-slate-500 font-bold uppercase">PSW</p><p className="text-2xl font-black text-slate-800">{stats.psw}</p></div></div>
            <div className="bg-white p-5 rounded-2xl shadow-sm border flex items-center gap-4"><div className="w-12 h-12 rounded-full bg-gray-100 text-gray-600 flex items-center justify-center text-xl"><i className="fas fa-ban"></i></div><div><p className="text-xs text-slate-500 font-bold uppercase">Tidak Hadir</p><p className="text-2xl font-black text-slate-800">{stats.tidakHadir}</p></div></div>
          </div>

          <div className="bg-white p-5 rounded-2xl shadow-sm border flex flex-wrap gap-4 items-center">
            <h3 className="font-bold text-lg text-slate-700 w-full md:w-auto mr-4">Filter Data:</h3>
            <input type="text" placeholder="Cari Lembaga..." className={`border p-3 rounded-xl flex-1 text-sm outline-none focus:border-blue-500 ${!canEditLembaga ? 'bg-slate-100 cursor-not-allowed' : ''}`} value={filterLembaga} onChange={e => canEditLembaga && setFilterLembaga(e.target.value)} disabled={!canEditLembaga} />
            <input type="text" placeholder="Cari Nama Pegawai..." className="border p-3 rounded-xl flex-1 text-sm outline-none focus:border-blue-500" value={filterNama} onChange={e => setFilterNama(e.target.value)} />
            {!canEditLembaga && userLembaga && (<span className="text-xs text-blue-600 bg-blue-50 px-2 py-1 rounded-full"><i className="fas fa-lock mr-1"></i> Filter lembaga dikunci</span>)}
            {canManageLibur && (<button onClick={() => setShowRangeModal(true)} className="bg-purple-600 hover:bg-purple-700 text-white px-5 py-3 rounded-xl font-bold shadow-sm flex items-center gap-2 transition"><i className="fas fa-calendar-alt"></i> Atur Libur Manual</button>)}
            {isAdmin && (<button onClick={openAddModal} className="bg-green-600 hover:bg-green-700 text-white px-5 py-3 rounded-xl font-bold shadow-sm flex items-center gap-2 transition"><i className="fas fa-plus-circle"></i> Tambah Presensi</button>)}
          </div>

          <div className="bg-white rounded-2xl shadow-sm border overflow-hidden">
            <div className="overflow-x-auto">
              <table className="w-full text-sm text-left">
                <thead className="bg-slate-800 text-white border-b">
                  <tr>
                    <th className="px-4 py-4">Waktu Presensi</th>
                    <th className="px-4 py-4">Lembaga</th>
                    <th className="px-4 py-4">Pegawai</th>
                    <th className="px-4 py-4 text-center">Bukti/Map</th>
                    <th className="px-4 py-4">Radius Status</th>
                    <th className="px-4 py-4">Ket. Bukti</th>
                    {isAdmin && <th className="px-4 py-4 text-center">Aksi</th>}
                   </tr>
                </thead>
                <tbody className="divide-y">
                  {paginatedData.map((item, i) => {
                    const outRadius = isOutsideRadius(item.displayRadius);
                    const late = checkLateStatus(item['Waktu'], item['Jenis Presensi']);
                    const tidakHadir = isTidakHadir(item.displayRadius);
                    const isPSW = item.isPSW;
                    let bgClass = "bg-white";
                    if (isPSW) bgClass = "bg-psw hover:bg-green-200";
                    else if (tidakHadir) bgClass = "bg-black text-white";
                    else if (outRadius) bgClass = "bg-outside hover:bg-red-200";
                    else if (late) bgClass = "bg-late hover:bg-yellow-200";
                    return (
                      <tr key={i} className={`${bgClass} transition-colors text-slate-700`}>
                        <td className="px-4 py-3 whitespace-nowrap"><span className="font-medium block">{item['Waktu']}</span><span className="text-[10px] px-1.5 py-0.5 bg-slate-200 rounded text-slate-600 font-bold uppercase">{item['Jenis Presensi']}</span></td>
                        <td className="px-4 py-3">{item['Nama Lembaga']}</td>
                        <td className="px-4 py-3"><div className="font-bold">{item['Nama Pegawai']}</div><div className="text-xs opacity-70">{item['Nip']}</div></td>
                        <td className="px-4 py-3 text-center"><div className="flex justify-center gap-2">
                          {canViewBukti ? (<button onClick={() => setModalImg(item['Bukti Dukung'])} className="w-8 h-8 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center hover:bg-blue-200 shadow-sm" title="Lihat Bukti"><i className="fas fa-image"></i></button>) : (<span className="w-8 h-8 rounded-full bg-slate-100 text-slate-400 flex items-center justify-center cursor-not-allowed" title="Hanya Admin/User/Superuser yang dapat melihat bukti"><i className="fas fa-lock"></i></span>)}
                          <button onClick={() => setModalMap({lat: item.Latitude, lng: item.Longitude})} className="w-8 h-8 rounded-full bg-emerald-100 text-emerald-600 flex items-center justify-center hover:bg-emerald-200 shadow-sm" title="Lihat Peta"><i className="fas fa-map-marker-alt"></i></button>
                        </div></td>
                        <td className="px-4 py-3"><span className={`px-2 py-1 rounded text-[10px] font-black uppercase ${isPSW ? 'bg-green-600 text-white' : tidakHadir ? 'bg-black text-white' : outRadius ? 'bg-red-600 text-white' : 'bg-green-600 text-white'}`}>{item.displayRadius}</span><div className="text-[10px] mt-1 text-slate-500 font-medium">{item['Jarak Absen']}</div></td>
                        <td className="px-4 py-3 min-w-[150px]">
                          {editingRow === item._rowIndex ? (<div className="flex gap-1"><input className="border p-1 rounded text-xs flex-1" value={editVal} onChange={e => setEditVal(e.target.value)} autoFocus /><button onClick={() => handleSaveKet(item._rowIndex)} className="bg-green-600 text-white px-2 py-1 rounded shadow-sm"><i className="fas fa-check"></i></button></div>) : (<div className="flex justify-between items-center group cursor-pointer" onClick={() => {setEditingRow(item._rowIndex); setEditVal(item['Keterangan Bukti'] || '');}}><span className="truncate max-w-[120px]">{item['Keterangan Bukti'] || '-'}</span><i className="fas fa-pencil-alt text-slate-300 group-hover:text-blue-500 text-xs transition"></i></div>)}
                        </td>
                        {isAdmin && (
                          <td className="px-4 py-3 text-center">
                            <div className="flex gap-2 justify-center">
                              <button onClick={() => openEditModal(item)} className="text-blue-600 hover:bg-blue-50 w-8 h-8 rounded-lg flex items-center justify-center transition" title="Edit"><i className="fas fa-edit"></i></button>
                              <button onClick={() => handleDelete(item._rowIndex, item['Nama Pegawai'])} className="text-red-600 hover:bg-red-50 w-8 h-8 rounded-lg flex items-center justify-center transition" title="Hapus"><i className="fas fa-trash-alt"></i></button>
                            </div>
                          </td>
                        )}
                      </tr>
                    );
                  })}
                  {paginatedData.length === 0 && (<tr><td colSpan={isAdmin ? 7 : 6} className="text-center py-10 text-slate-400 font-medium italic">Data tidak ditemukan atau belum dimuat...</td></td>)}
                </tbody>
              </table>
            </div>
            <TablePagination currentPage={currentPage} totalItems={totalItems} rowsPerPage={rowsPerPage} onPageChange={setCurrentPage} onRowsPerPageChange={(val) => setRowsPerPage(val)} />
          </div>

          {/* Modal Image */}
          {modalImg && (<div className="fixed inset-0 z-50 bg-black/80 flex items-center justify-center p-4" onClick={() => setModalImg(null)}><div className="relative max-w-4xl w-full bg-white rounded-xl shadow-2xl overflow-hidden" onClick={e => e.stopPropagation()}><div className="p-4 flex justify-between items-center bg-slate-800 text-white"><h4 className="font-bold flex items-center gap-2"><i className="fas fa-file-image text-blue-400"></i> Bukti Dukung</h4><button onClick={() => setModalImg(null)} className="text-3xl leading-none">&times;</button></div><div className="w-full h-[80vh] bg-slate-100 flex items-center justify-center">{modalImg.includes('drive.google.com') ? (<iframe src={`https://drive.google.com/file/d/${extractFileIdFromDriveUrl(modalImg)}/preview`} className="w-full h-full" allow="autoplay" sandbox="allow-same-origin allow-scripts" title="Preview Google Drive" />) : (<img src={modalImg} alt="Bukti Dukung" className="w-full h-full object-contain" onError={(e) => { e.target.onerror = null; e.target.parentNode.innerHTML = `<div class="flex flex-col items-center justify-center h-full p-8"><i class="fas fa-exclamation-triangle text-4xl text-red-500 mb-4"></i><p class="text-lg font-bold text-gray-700">Gambar tidak dapat ditampilkan</p><p class="text-sm text-gray-500 mt-2">Kesalahan memuat gambar</p></div>`; }} />)}</div></div></div>)}
          {/* Modal Map */}
          {modalMap && (<div className="fixed inset-0 z-50 bg-black/80 flex items-center justify-center p-4" onClick={() => setModalMap(null)}><div className="w-full max-w-3xl bg-white rounded-2xl overflow-hidden shadow-2xl" onClick={e => e.stopPropagation()}><div className="p-4 flex justify-between items-center bg-slate-800 text-white"><h4 className="font-bold flex items-center gap-2"><i className="fas fa-map-marked-alt text-blue-400"></i>Lokasi Presensi</h4><button onClick={() => setModalMap(null)} className="text-3xl leading-none">&times;</button></div><iframe width="100%" height="450" frameBorder="0" style={{border:0}} src={`https://maps.google.com/maps?q=${modalMap.lat},${modalMap.lng}&z=16&output=embed`} allowFullScreen></iframe></div></div>)}
          {/* Modal Atur Libur Manual */}
          {showRangeModal && (<div className="fixed inset-0 z-50 bg-black/80 flex items-center justify-center p-4" onClick={() => setShowRangeModal(false)}><div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg" onClick={e => e.stopPropagation()}><div className="p-6 border-b flex justify-between items-center bg-slate-800 text-white"><h4 className="text-xl font-bold flex items-center gap-2"><i className="fas fa-calendar-alt text-purple-400"></i> Atur Libur Manual</h4><button onClick={() => setShowRangeModal(false)} className="text-3xl leading-none">&times;</button></div><div className="p-6 space-y-4"><div><label className="block text-xs font-bold uppercase text-slate-500 mb-1">Tanggal Awal</label><input type="date" className="w-full border p-3 rounded-xl focus:ring-2 focus:ring-purple-500 outline-none" value={rangeStart} onChange={e => setRangeStart(e.target.value)} /></div><div><label className="block text-xs font-bold uppercase text-slate-500 mb-1">Tanggal Akhir</label><input type="date" className="w-full border p-3 rounded-xl focus:ring-2 focus:ring-purple-500 outline-none" value={rangeEnd} onChange={e => setRangeEnd(e.target.value)} /></div><div><label className="block text-xs font-bold uppercase text-slate-500 mb-1">Status</label><select className="w-full border p-3 rounded-xl focus:ring-2 focus:ring-purple-500 outline-none" value={rangeStatus} onChange={e => setRangeStatus(e.target.value)}><option value="Libur">Libur</option><option value="Cuti Bersama">Cuti Bersama</option><option value="Izin">Izin</option><option value="Sakit">Sakit</option></select></div><div><label className="block text-xs font-bold uppercase text-slate-500 mb-1">Keterangan (opsional)</label><textarea className="w-full border p-3 rounded-xl focus:ring-2 focus:ring-purple-500 outline-none" rows="3" value={rangeKeterangan} onChange={e => setRangeKeterangan(e.target.value)} placeholder="Misal: Libur Nasional"></textarea></div><div className="flex justify-end gap-3 pt-4"><button onClick={() => setShowRangeModal(false)} className="px-6 py-3 border-2 border-slate-300 rounded-xl font-bold text-slate-600 hover:bg-slate-50 transition">Batal</button><button onClick={async () => { if (!rangeStart || !rangeEnd) { Swal.fire('Peringatan', 'Tanggal awal dan akhir harus diisi', 'warning'); return; } const loading = Swal.fire({ title: 'Memproses...', allowOutsideClick: false, didOpen: () => Swal.showLoading() }); const res = await runGoogleScript('setStatusRentang', rangeStart, rangeEnd, rangeStatus, rangeKeterangan); loading.close(); if (res.success) { Swal.fire({ icon: 'success', title: 'Berhasil', text: `${res.updated} data diupdate` }); setShowRangeModal(false); refreshData(); } else { Swal.fire('Error', 'Gagal mengupdate data', 'error'); } }} className="px-6 py-3 bg-purple-600 text-white rounded-xl font-bold shadow-lg hover:bg-purple-700 transition">Terapkan</button></div></div></div></div>)}

          {/* Modal CRUD Presensi */}
          {showCRUDModal && (
            <div className="fixed inset-0 z-50 bg-black/80 flex items-center justify-center p-4" onClick={() => setShowCRUDModal(false)}>
              <div className="bg-white rounded-2xl shadow-2xl w-full max-w-4xl max-h-[90vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
                <div className="p-6 border-b flex justify-between items-center bg-slate-800 text-white sticky top-0">
                  <h4 className="text-xl font-bold flex items-center gap-2">
                    <i className={`fas ${crudMode === 'add' ? 'fa-plus-circle' : 'fa-edit'} text-blue-400`}></i>
                    {crudMode === 'add' ? 'Tambah Presensi Baru' : 'Edit Presensi'}
                  </h4>
                  <button onClick={() => setShowCRUDModal(false)} className="text-3xl leading-none hover:text-slate-300">&times;</button>
                </div>
                <div className="p-6 space-y-4">
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div><label className="block text-xs font-bold uppercase text-slate-500 mb-1">Hari Tanggal (format: Senin, 01 Januari 2025)</label><input type="text" name="Hari Tanggal" value={formValues['Hari Tanggal']} onChange={e => setFormValues({...formValues, 'Hari Tanggal': e.target.value})} className="w-full border p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" /></div>
                    <div><label className="block text-xs font-bold uppercase text-slate-500 mb-1">Waktu (format: Senin, 01 Januari 2025 pukul 07.00.00) *</label><input type="text" name="Waktu" value={formValues['Waktu']} onChange={e => setFormValues({...formValues, 'Waktu': e.target.value})} className="w-full border p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" required /></div>
                    <div><label className="block text-xs font-bold uppercase text-slate-500 mb-1">Jenis Presensi *</label><select name="Jenis Presensi" value={formValues['Jenis Presensi']} onChange={e => setFormValues({...formValues, 'Jenis Presensi': e.target.value})} className="w-full border p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" required><option value="">Pilih</option><option value="Datang">Datang</option><option value="Pulang">Pulang</option></select></div>
                    <div><label className="block text-xs font-bold uppercase text-slate-500 mb-1">Nama Lembaga</label><input type="text" name="Nama Lembaga" value={formValues['Nama Lembaga']} onChange={e => setFormValues({...formValues, 'Nama Lembaga': e.target.value})} className="w-full border p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" /></div>
                    <div><label className="block text-xs font-bold uppercase text-slate-500 mb-1">Nama Pegawai *</label><input type="text" name="Nama Pegawai" value={formValues['Nama Pegawai']} onChange={e => setFormValues({...formValues, 'Nama Pegawai': e.target.value})} className="w-full border p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" required /></div>
                    <div><label className="block text-xs font-bold uppercase text-slate-500 mb-1">Nip</label><input type="text" name="Nip" value={formValues['Nip']} onChange={e => setFormValues({...formValues, 'Nip': e.target.value})} className="w-full border p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" /></div>
                    <div><label className="block text-xs font-bold uppercase text-slate-500 mb-1">Bukti Dukung (URL Gambar / Link Drive)</label><input type="text" name="Bukti Dukung" value={formValues['Bukti Dukung']} onChange={e => setFormValues({...formValues, 'Bukti Dukung': e.target.value})} className="w-full border p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" /></div>
                    <div><label className="block text-xs font-bold uppercase text-slate-500 mb-1">Latitude</label><input type="text" name="Latitude" value={formValues['Latitude']} onChange={e => setFormValues({...formValues, 'Latitude': e.target.value})} className="w-full border p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" /></div>
                    <div><label className="block text-xs font-bold uppercase text-slate-500 mb-1">Longitude</label><input type="text" name="Longitude" value={formValues['Longitude']} onChange={e => setFormValues({...formValues, 'Longitude': e.target.value})} className="w-full border p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" /></div>
                    <div><label className="block text-xs font-bold uppercase text-slate-500 mb-1">Jarak Absen</label><input type="text" name="Jarak Absen" value={formValues['Jarak Absen']} onChange={e => setFormValues({...formValues, 'Jarak Absen': e.target.value})} className="w-full border p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" /></div>
                    <div><label className="block text-xs font-bold uppercase text-slate-500 mb-1">Keterangan Radius</label><input type="text" name="Keterangan Radius" value={formValues['Keterangan Radius']} onChange={e => setFormValues({...formValues, 'Keterangan Radius': e.target.value})} className="w-full border p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" /></div>
                    <div><label className="block text-xs font-bold uppercase text-slate-500 mb-1">Keterangan Bukti</label><input type="text" name="Keterangan Bukti" value={formValues['Keterangan Bukti']} onChange={e => setFormValues({...formValues, 'Keterangan Bukti': e.target.value})} className="w-full border p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" /></div>
                  </div>
                  <div className="flex justify-end gap-3 pt-4 border-t">
                    <button onClick={() => setShowCRUDModal(false)} className="px-6 py-3 border-2 border-slate-300 rounded-xl font-bold text-slate-600 hover:bg-slate-50 transition">Batal</button>
                    <button onClick={handleSubmitCRUD} className="px-6 py-3 bg-blue-600 text-white rounded-xl font-bold shadow-lg hover:bg-blue-700 transition">Simpan</button>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    // ========== KOMPONEN DOKUMEN IJIN ==========
    const DokumenIjin = ({ data, refreshData, userRole, userLembaga }) => {
      const [modalPdf, setModalPdf] = useState(null);
      const [editRow, setEditRow] = useState(null);
      const [status, setStatus] = useState('');
      const [ket, setKet] = useState('');
      const [filterLembaga, setFilterLembaga] = useState('');
      const [filterNama, setFilterNama] = useState('');
      const [currentPage, setCurrentPage] = useState(1);
      const [rowsPerPage, setRowsPerPage] = useState(10);
      const canEditLembaga = userRole === 'Admin' || userRole === 'User' || userRole === 'Superuser';
      const canEditData = userRole === 'Admin' || userRole === 'User' || userRole === 'Superuser';

      useEffect(() => { if (!canEditLembaga && userLembaga) setFilterLembaga(userLembaga); }, [canEditLembaga, userLembaga]);
      const filtered = useMemo(() => data.filter(item => (item['Nama Lembaga'] || '').toLowerCase().includes(filterLembaga.toLowerCase()) && (item['Nama Pegawai'] || '').toLowerCase().includes(filterNama.toLowerCase())), [data, filterLembaga, filterNama]);
      useEffect(() => setCurrentPage(1), [filterLembaga, filterNama]);
      const totalItems = filtered.length;
      useEffect(() => { if (rowsPerPage > totalItems && totalItems > 0) setRowsPerPage(totalItems); else if (totalItems === 0) setRowsPerPage(10); }, [totalItems, rowsPerPage]);
      const effectiveRowsPerPage = rowsPerPage === totalItems ? totalItems : rowsPerPage;
      const paginatedData = filtered.slice((currentPage - 1) * effectiveRowsPerPage, currentPage * effectiveRowsPerPage);

      const handleSave = async (idx) => { const res = await runGoogleScript('updateDokumenIjin', idx, status, ket); if (res.success) { Swal.fire({ icon: 'success', title: 'Berhasil Update', timer: 1000, showConfirmButton: false }); setEditRow(null); refreshData(); } };
      const handleDelete = async (rowIndex, nama) => { const confirm = await Swal.fire({ title: 'Hapus Dokumen Ijin?', text: `Yakin ingin menghapus pengajuan dari ${nama}?`, icon: 'warning', showCancelButton: true, confirmButtonColor: '#d33', cancelButtonColor: '#334155', confirmButtonText: 'Ya, Hapus' }); if (confirm.isConfirmed) { const res = await runGoogleScript('deleteDokumenIjin', rowIndex); if (res.success) { Swal.fire('Terhapus', 'Data berhasil dihapus', 'success'); refreshData(); } else { Swal.fire('Error', 'Gagal menghapus data', 'error'); } } };

      return (
        <div className="space-y-6">
          <div className="bg-white p-5 rounded-2xl shadow-sm border flex flex-wrap gap-4 items-center"><h3 className="font-bold text-lg text-slate-700 w-full md:w-auto mr-4">Filter Dokumen Ijin:</h3><input type="text" placeholder="Cari Lembaga..." className={`border p-3 rounded-xl flex-1 text-sm outline-none focus:border-blue-500 ${!canEditLembaga ? 'bg-slate-100 cursor-not-allowed' : ''}`} value={filterLembaga} onChange={e => canEditLembaga && setFilterLembaga(e.target.value)} disabled={!canEditLembaga} /><input type="text" placeholder="Cari Nama Pegawai..." className="border p-3 rounded-xl flex-1 text-sm outline-none focus:border-blue-500" value={filterNama} onChange={e => setFilterNama(e.target.value)} />{!canEditLembaga && userLembaga && (<span className="text-xs text-blue-600 bg-blue-50 px-2 py-1 rounded-full"><i className="fas fa-lock mr-1"></i> Filter lembaga dikunci</span>)}</div>
          <div className="bg-white rounded-2xl shadow-sm border overflow-hidden">
            <div className="overflow-x-auto">
              <table className="w-full text-sm text-left">
                <thead className="bg-slate-800 text-white border-b">
                  <tr>
                    <th className="px-4 py-4">Nama Pegawai</th>
                    <th className="px-4 py-4">Jenis Ijin</th>
                    <th className="px-4 py-4">Tanggal Awal</th>
                    <th className="px-4 py-4">Tanggal Akhir</th>
                    <th className="px-4 py-4 text-center">File</th>
                    <th className="px-4 py-4">Status</th>
                    <th className="px-4 py-4">Keterangan</th>
                    {canEditData && <th className="px-4 py-4 text-center">Aksi</th>}
                   </tr>

      const clearDateFilter = () => { setDateStart(''); setDateEnd(''); };

'Jenis Presensi']); const tidakHadir = isTidakHadir(item.displayRadius); const isPSW = item.isPSW; if (isPSW) { data.cell.styles.fillColor = [209, 250, 229]; data.cell.styles.textColor = [6, 78, 59]; } else if (tidakHadir) { data.cell.styles.fillColor = [0, 0, 0]; data.cell.styles.textColor = [255, 255, 255]; } else if (outRadius) { data.cell.styles.fillColor = [254, 226, 226]; data.cell.styles.textColor = [153, 27, 27]; } else if (late) { data.cell.styles.fillColor = [254, 249, 195]; data.cell.styles.textColor = [133, 77, 14]; } } } }); doc.save(`Laporan_Presensi_Sine_${new Date().toISOString().split('T')[0]}.pdf`); };
      const handleReset = async () => { const resConfirm = await Swal.fire({ title: 'RESET SEMUA DATA?', text: 'Data yang terhapus tidak dapat dikembalikan. Pastikan Anda sudah mengunduh PDF Laporan!', icon: 'warning', showCancelButton: true, confirmButtonColor: '#d33', cancelButtonColor: '#334155', confirmButtonText: 'Ya, Bersihkan Data' }); if (resConfirm.isConfirmed) { Swal.fire({ title: 'Menghapus...', allowOutsideClick: false, didOpen: () => Swal.showLoading() }); const res = await runGoogleScript('resetDataPresensi'); if (res.success) { Swal.fire('Terhapus', 'Database presensi telah dikosongkan.', 'success'); refreshData(); } } };
      return (
        <div className="bg-white p-8 rounded-2xl shadow-sm border space-y-8"><div className="border-b pb-6"><h3 className="text-2xl font-black text-slate-800 flex items-center gap-2"><i className="fas fa-file-export text-blue-600"></i> Manajemen Data</h3><p className="text-slate-500 text-sm">Gunakan menu ini untuk mencetak laporan resmi atau melakukan pembersihan database secara berkala.</p></div><div className="grid grid-cols-1 md:grid-cols-2 gap-8">{canExport ? (<div className="bg-slate-50 p-6 rounded-2xl border border-slate-200"><h4 className="font-bold text-slate-700 mb-4 flex items-center gap-2"><i className="fas fa-print text-emerald-600"></i> Ekspor Laporan PDF</h4><div className="space-y-4"><div><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 block">Filter Lembaga</label><input type="text" className="w-full border p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="Tulis nama lembaga (opsional)..." value={filterLembaga} onChange={e => setFilterLembaga(e.target.value)} /></div><div><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 block">Rentang Tanggal</label><div className="flex flex-wrap gap-3"><input type="date" className="flex-1 border p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" value={dateStart} onChange={e => setDateStart(e.target.value)} /><span className="self-center">s.d.</span><input type="date" className="flex-1 border p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" value={dateEnd} onChange={e => setDateEnd(e.target.value)} /></div><div className="flex gap-2 mt-2"><button onClick={setThisMonth} className="text-xs bg-blue-100 text-blue-700 px-3 py-1 rounded-full hover:bg-blue-200 transition">Bulan Ini</button>{(dateStart || dateEnd) && (<button onClick={clearDateFilter} className="text-xs bg-gray-200 text-gray-700 px-3 py-1 rounded-full hover:bg-gray-300 transition">Hapus Filter</button>)}</div></div><button     // ========== KOMPONEN LOG AKTIVITAS (HANYA ADMIN) ==========
    const ActivityLog = ({ userRole }) => {
      const [logs, setLogs] = useState([]);
      const [loading, setLoading] = useState(false);
      const [filterUsername, setFilterUsername] = useState('');

          <div className="bg-white p-8 rounded-2xl shadow-sm border text-center">
            <i className="fas fa-lock text-6xl text-gray-400 mb-4"></i>
            <h3 className="text-xl font-bold text-gray-700">Akses Ditolak</h3>
            <p className="text-gray-500 mt-2">Anda tidak memiliki hak akses untuk melihat Log Aktivitas. Hanya Admin yang diperbolehkan.</p>
          </div>
        );
      }

      return (
        <div className="space-y-6">
          <div className="bg-white p-5 rounded-2xl shadow-sm border">
            <h3 className="font-bold text-xl text-slate-800 flex items-center gap-2"><i className="fas fa-history text-blue-600"></i> Log Monitoring</h3>
            <p className="text-slate-500 text-sm mt-1">Riwayat login dan aktivitas pengguna.</p>
          </div>
          <div className="bg-white p-5 rounded-2xl shadow-sm border flex flex-wrap gap-4 items-center">
            <input type="text" placeholder="Cari Username..." className="border p-3 rounded-xl flex-1 text-sm outline-none focus:border-blue-500" value={filterUsername} onChange={e => setFilterUsername(e.target.value)} />
            <input type="text" placeholder="Cari Aksi..." className="border p-3 rounded-xl flex-1 text-sm outline-none focus:border-blue-500" value={filterAction} onChange={e => setFilterAction(e.target.value)} />
            <input type="date" placeholder="Mulai" className="border p-3 rounded-xl text-sm outline-none focus:border-blue-500" value={dateStart} onChange={e => setDateStart(e.target.value)} />
            <input type="date" placeholder="Sampai" className="border p-3 rounded-xl text-sm outline-none focus:border-blue-500" value={dateEnd} onChange={e => setDateEnd(e.target.value)} />
            <button onClick={() => { setFilterUsername(''); setFilterAction(''); setDateStart(''); setDateEnd(''); }} className="bg-gray-200 hover:bg-gray-300 px-4 py-3 rounded-xl font-bold text-sm transition">Reset Filter</button>
          </div>
          <div className="bg-white rounded-2xl shadow-sm border overflow-hidden">
            <div className="overflow-x-auto">
              <table className="w-full text-sm text-left">
                <thead className="bg-slate-800 text-white border-b">
                  <tr>
                    <th className="px-4 py-4">Timestamp</th>
                    <th className="px-4 py-4">Username</th>
                    <th className="px-4 py-4">Role</th>
                    <th className="px-4 py-4">Action</th>
                    <th className="px-4 py-4">Details</th>
                  </tr>
                </thead>
                <tbody className="divide-y text-slate-700">
                  {paginatedLogs.length > 0 ? paginatedLogs.map((log, i) => (
                    <tr key={i} className="hover:bg-slate-50 transition-colors">
                      <td className="px-4 py-3 whitespace-nowrap">{log.Timestamp ? new Date(log.Timestamp).toLocaleString('id-ID') : '-'}</td>
                      <td className="px-4 py-3 font-medium">{log.Username || '-'}</td>
                      <td className="px-4 py-3">{log.Role || '-'}</td>
                      <td className="px-4 py-3"><span className={`px-2 py-1 rounded text-[10px] font-black uppercase ${log.Action === 'login' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>{log.Action || '-'}</span></td>
                      <td className="px-4 py-3">{log.Details || '-'}</td>
                    </tr>
                  )) : (<tr><td colSpan="5" className="text-center py-10 text-slate-400 italic">Tidak ada data log aktivitas.</td></tr>)}
                </tbody>
              </table>
            </div>
            {totalItems > 0 && (<TablePagination currentPage={currentPage} totalItems={totalItems} rowsPerPage={rowsPerPage} onPageChange={setCurrentPage} onRowsPerPageChange={(val) => { setRowsPerPage(val); setCurrentPage(1); }} />)}
          </div>
        </div>
      );
    };

    // ========== KOMPONEN PENGAJUAN PSW (BARU) ==========
    const PengajuanPSW = ({ user }) => {
      const [pegawaiList, setPegawaiList] = useState([]);
      const [formData, setFormData] = useState({
        nip: '',
        jenis: '',
        tglAwal: '',
        tglAkhir: ''
      });
      const [file, setFile] = useState(null);
      const [loading, setLoading] = useState(false);

      // Ambil daftar pegawai dari lembaga user saat komponen dimuat
      useEffect(() => {
        const fetchPegawai = async () => {
          if (!user || !user.lembaga) return;
          const res = await runGoogleScript('getPegawaiByLembaga', user.lembaga);
          if (Array.isArray(res)) {
            setPegawaiList(res);
          } else {
            setPegawaiList([]);
          }
        };
        fetchPegawai();
      }, [user]);

      const handleFileChange = (e) => {
        const f = e.target.files[0];
        if (f) {
          if (f.type !== 'application/pdf') {
            Swal.fire('Format Salah', 'Hanya dokumen PDF yang diizinkan.', 'warning');
            e.target.value = '';
            return;
          }
          if (f.size > 5 * 1024 * 1024) {
            Swal.fire('Terlalu Besar', 'Ukuran PDF maksimal 5MB.', 'warning');
            e.target.value = '';
            return;
          }
          const reader = new FileReader();
          reader.onload = () => setFile({ name: f.name, base64: reader.result });
          reader.readAsDataURL(f);
        }
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
        if (!file) {
          Swal.fire('Peringatan', 'Dokumen PDF Bukti Dukung wajib dilampirkan.', 'warning');
          return;
        }
        if (!formData.nip) {
          Swal.fire('Peringatan', 'Pilih pegawai terlebih dahulu.', 'warning');
          return;
        }
        if (!formData.jenis) {
          Swal.fire('Peringatan', 'Pilih kategori pengajuan.', 'warning');
          return;
        }
        if (!formData.tglAwal || !formData.tglAkhir) {
          Swal.fire('Peringatan', 'Tanggal mulai dan selesai harus diisi.', 'warning');
          return;
        }

        const selectedPegawai = pegawaiList.find(p => p.nip === formData.nip);
        if (!selectedPegawai) {
          Swal.fire('Error', 'Data pegawai tidak ditemukan.', 'error');
          return;
        }

        setLoading(true);
        const payload = {
          lembaga: user.lembaga,
          namaPegawai: selectedPegawai.nama,
          nip: selectedPegawai.nip,
          jenis: formData.jenis,
          tglAwal: formData.tglAwal,
          tglAkhir: formData.tglAkhir,
          fileName: file.name,
          fileBase64: file.base64
        };

        const res = await runGoogleScript('submitPengajuan', payload);
        setLoading(false);
        if (res.success) {
          Swal.fire({ icon: 'success', title: 'Terkirim', text: 'Pengajuan berhasil diteruskan ke Korwil.', confirmButtonColor: '#2563eb' });
          // Reset form
          setFormData({ nip: '', jenis: '', tglAwal: '', tglAkhir: '' });
          setFile(null);
          document.getElementById('fileInput').value = '';
        } else {
          Swal.fire('Gagal', res.message, 'error');
        }
      };

      return (
        <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 md:p-8">
          <div className="border-b border-slate-100 pb-5 mb-6">
            <h3 className="text-xl font-bold text-slate-800">Form Pengajuan PSW</h3>
            <p className="text-sm text-slate-500 mt-1">Lembaga: <span className="font-semibold text-blue-600">{user.lembaga}</span></p>
          </div>

          <form onSubmit={handleSubmit} className="space-y-6">
            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
              {/* Dropdown Pegawai */}
              <div className="md:col-span-2">
                <label className="block text-sm font-semibold text-slate-700 mb-2">Pilih Pegawai</label>
                <select
                  required
                  value={formData.nip}
                  onChange={e => setFormData({...formData, nip: e.target.value})}
                  className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none"
                >
                  <option value="" disabled>-- Pilih Pegawai --</option>
                  {pegawaiList.map(p => (
                    <option key={p.nip} value={p.nip}>{p.nama} (NIP: {p.nip})</option>
                  ))}
                </select>
              </div>

              {/* Jenis Ijin - Radio Cards */}
              <div className="md:col-span-2">
                <label className="block text-sm font-semibold text-slate-700 mb-2">Kategori Pengajuan</label>
                <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
                  {[
                    { id: 'Sakit', icon: 'fa-briefcase-medical', color: 'orange' },
                    { id: 'Ijin', icon: 'fa-envelope-open-text', color: 'blue' },
                    { id: 'Dinas Luar', icon: 'fa-car-side', color: 'indigo' }
                  ].map(item => {
                    const isSelected = formData.jenis === item.id;
                    return (
                      <label key={item.id} className={`cursor-pointer border-2 rounded-xl p-4 flex flex-col items-center justify-center transition-all ${isSelected ? `bg-${item.color}-50 border-${item.color}-500 text-${item.color}-700 shadow-md` : 'bg-white border-slate-100 hover:border-slate-300 text-slate-500 hover:bg-slate-50'}`}>
                        <input type="radio" name="jenis" value={item.id} className="hidden" checked={isSelected} onChange={e => setFormData({...formData, jenis: e.target.value})} required />
                        <div className={`w-12 h-12 rounded-full mb-2 flex items-center justify-center text-xl ${isSelected ? `bg-${item.color}-100` : 'bg-slate-100'}`}>
                          <i className={`fas ${item.icon}`}></i>
                        </div>
                        <span className="font-bold text-sm">{item.id}</span>
                      </label>
                    );
                  })}
                </div>
              </div>

              {/* Tanggal */}
              <div>
                <label className="block text-sm font-semibold text-slate-700 mb-2">Tanggal Mulai</label>
                <input type="date" required value={formData.tglAwal} onChange={e => setFormData({...formData, tglAwal: e.target.value})} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none" />
              </div>
              <div>
                <label className="block text-sm font-semibold text-slate-700 mb-2">Tanggal Selesai</label>
                <input type="date" required min={formData.tglAwal} value={formData.tglAkhir} onChange={e => setFormData({...formData, tglAkhir: e.target.value})} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none" />
              </div>

              {/* File Upload Area */}
              <div className="md:col-span-2">
                <label className="block text-sm font-semibold text-slate-700 mb-2">Lampiran Bukti Dukung (PDF)</label>
                <div className={`border-2 border-dashed rounded-2xl p-8 flex flex-col items-center justify-center transition-all relative ${file ? 'border-green-400 bg-green-50' : 'border-slate-300 bg-slate-50 hover:bg-slate-100'}`}>
                  <input id="fileInput" type="file" accept=".pdf" onChange={handleFileChange} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" required />
                  {file ? (
                    <div className="text-center">
                      <div className="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-3 text-2xl">
                        <i className="fas fa-file-check"></i>
                      </div>
                      <p className="font-bold text-slate-800 text-sm">{file.name}</p>
                      <p className="text-xs text-green-600 mt-1 font-semibold">Siap diunggah - Klik untuk mengganti</p>
                    </div>
                  ) : (
                    <div className="text-center">
                      <div className="w-16 h-16 bg-blue-100 text-blue-500 rounded-full flex items-center justify-center mx-auto mb-3 text-2xl">
                        <i className="fas fa-cloud-upload-alt"></i>
                      </div>
                      <p className="font-bold text-slate-700">Klik atau Tarik file PDF ke sini</p>
                      <p className="text-xs text-slate-500 mt-1">Maksimal ukuran file 5MB</p>
                    </div>
                  )}
                </div>
              </div>
            </div>

            <div className="pt-6 border-t border-slate-100 flex justify-end">
              <button type="submit" disabled={loading} className="w-full md:w-auto px-8 py-3.5 bg-gradient-to-r from-blue-600 to-indigo-700 text-white rounded-xl font-bold text-sm shadow-lg shadow-blue-500/30 hover:opacity-90 transition-all disabled:opacity-70 flex items-center justify-center gap-2">
                {loading ? <i className="fas fa-spinner fa-spin"></i> : <i className="fas fa-paper-plane"></i>}
                {loading ? 'Memproses Pengiriman...' : 'Kirim Pengajuan'}
              </button>
            </div>
          </form>
        </div>
      );
    };

    // ========== MAIN APP ==========
    const App = () => {
      const [user, setUser] = useState(null);
      const [activeTab, setActiveTab] = useState('dashboard');
      const [presensi, setPresensi] = useState([]);
      const [ijin, setIjin] = useState([]);
      const [loading, setLoading] = useState(false);

      const fetchData = async () => { setLoading(true); try { const [resP, resI] = await Promise.all([runGoogleScript('getPresensi'), runGoogleScript('getIjin')]); setPresensi(resP || []); setIjin(resI || []); } catch (e) { console.error(e); } setLoading(false); };
      useEffect(() => { if (user) fetchData(); }, [user]);

      const enrichedPresensi = useMemo(() => enrichPresensiWithIjin(presensi, ijin), [presensi, ijin]);

      const canAccessPegawai = user && (user.role === 'Admin' || user.role === 'Superuser' || user.role === 'User');
      const canEditAllLembaga = user && (user.role === 'Admin' || user.role === 'Superuser' || user.role === 'User');
      const userLembaga = !canEditAllLembaga ? (user ? user.role : '') : (user ? user.lembaga : '');

      // Tabs: tambahkan 'pengajuan_psw'
      const tabs = [
        {id: 'dashboard', icon: 'fa-chart-pie', label: 'Dashboard Presensi'},
        {id: 'dokumen_ijin', icon: 'fa-file-signature', label: 'Dokumen Ijin (PSW)'},
        {id: 'pengajuan_psw', icon: 'fa-file-upload', label: 'Pengajuan PSW'},  // <-- TAB BARU
        ...(canAccessPegawai ? [{id: 'pegawai', icon: 'fa-users', label: 'Database Pegawai'}] : []),
        {id: 'monitoring', icon: 'fa-desktop', label: 'Monitoring & Ekspor'},
        {id: 'activity', icon: 'fa-history', label: 'Error Logs'}
      ];

      const handleLogout = () => { Swal.fire({ title: 'Yakin ingin keluar?', text: 'Anda akan kembali ke halaman login.', icon: 'question', showCancelButton: true, confirmButtonColor: '#d33', cancelButtonColor: '#334155', confirmButtonText: 'Ya, Keluar', cancelButtonText: 'Batal' }).then((result) => { if (result.isConfirmed) setUser(null); }); };

      if (!user) return <Login onLogin={setUser} />;

      return (
        <div className="min-h-screen flex flex-col md:flex-row bg-slate-100">
          <div className="w-full md:w-72 bg-slate-900 text-white flex flex-col shadow-2xl z-40">
            <div className="p-8 border-b border-slate-800 flex items-center gap-4 bg-slate-950/50"><div className="bg-blue-600 w-12 h-12 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-500/20 overflow-hidden"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c8/Lambang_Kabupaten_Ngawi_%28svg%29.svg/1280px-Lambang_Kabupaten_Ngawi_%28svg%29.svg.png" alt="Logo Ngawi" className="w-full h-full object-cover" onError={(e) => { e.target.onerror = null; e.target.src = 'https://via.placeholder.com/48?text=Logo'; }} /></div><div><span className="font-black text-xl tracking-tighter block">KORWIL SINE</span><span className="text-[10px] text-blue-400 font-bold uppercase tracking-widest">Dashboard Monitoring</span></div></div>
            <nav className="flex-1 p-6 space-y-2">{tabs.map(tab => (<button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`w-full flex items-center gap-4 px-5 py-4 rounded-2xl font-bold transition-all duration-300 ${activeTab === tab.id ? 'bg-blue-600 text-white shadow-xl translate-x-1' : 'text-slate-500 hover:bg-slate-800 hover:text-slate-300'}`}><i className={`fas ${tab.icon} w-6 text-center text-lg`}></i> {tab.label}</button>))}</nav>
            <div className="p-6 border-t border-slate-800 bg-slate-950/30"><div className="flex items-center gap-4 mb-6 px-2"><div className="w-10 h-10 rounded-full bg-slate-700 flex items-center justify-center border-2 border-blue-500/30 text-blue-400 font-black">{user.nama.charAt(0)}</div><div className="overflow-hidden"><div className="text-xs text-slate-500 font-bold uppercase tracking-tighter">Petugas:</div><div className="font-black text-sm text-slate-200 truncate">{user.nama}</div><div className="mt-1"><span className="px-2 py-0.5 bg-blue-600/20 text-blue-400 rounded-full text-[8px] font-black uppercase tracking-wider">{user.role}</span></div>{userLembaga && (<div className="mt-1 text-[10px] text-slate-400"><i className="fas fa-building mr-1"></i>{userLembaga}</div>)}</div></div><button onClick={handleLogout} className="w-full bg-red-600/10 hover:bg-red-600 text-red-500 hover:text-white py-3 rounded-xl font-black transition-all border border-red-500/20 flex items-center justify-center gap-2"><i className="fas fa-power-off"></i> KELUAR</button></div>
          </div>
          <div className="flex-1 flex flex-col h-screen overflow-hidden"><header className="bg-white/80 backdrop-blur-md border-b px-8 py-5 flex justify-between items-center z-30 shadow-sm"><h2 className="text-2xl font-black text-slate-800 capitalize flex items-center gap-3"><span className="w-2 h-8 bg-blue-600 rounded-full"></span>{activeTab === 'dashboard' && 'Dashboard Presensi'}{activeTab === 'dokumen_ijin' && 'Dokumen Ijin (PSW)'}{activeTab === 'pengajuan_psw' && 'Pengajuan PSW'}{activeTab === 'pegawai' && 'Database Pegawai'}{activeTab === 'monitoring' && 'Monitoring & Ekspor'}{activeTab === 'activity' && 'Log Monitoring'}</h2><button onClick={fetchData} className={`w-12 h-12 rounded-2xl flex items-center justify-center hover:bg-blue-50 text-slate-400 hover:text-blue-600 transition-all border border-slate-100 ${loading ? 'bg-blue-50' : 'bg-white'}`}><i className={`fas fa-sync-alt text-lg ${loading ? 'fa-spin text-blue-600' : ''}`}></i></button></header><div className="flex-1 overflow-auto p-4 md:p-8">{loading && presensi.length === 0 && activeTab !== 'pegawai' ? (<div className="h-full flex flex-col items-center justify-center space-y-6"><div className="loader border-4 border-blue-100 border-t-blue-600 rounded-full w-16 h-16"></div><div className="text-center"><span className="text-slate-800 font-black text-xl block">Menghubungkan ke Server...</span><span className="text-slate-400 text-sm">Sedang sinkronisasi</span></div></div>) : (<div className="max-w-7xl mx-auto">{activeTab === 'dashboard' && <Dashboard data={enrichedPresensi} refreshData={fetchData} userRole={user.role} userLembaga={userLembaga} />}{activeTab === 'dokumen_ijin' && <DokumenIjin data={ijin} refreshData={fetchData} userRole={user.role} userLembaga={userLembaga} />}{activeTab === 'pengajuan_psw' && <PengajuanPSW user={user} />}{activeTab === 'pegawai' && canAccessPegawai && <DatabasePegawai refreshParent={fetchData} userRole={user.role} />}{activeTab === 'monitoring' && <Monitoring presensiData={enrichedPresensi} refreshData={fetchData} userRole={user.role} />}{activeTab === 'activity' && <ActivityLog userRole={user.role} />}</div>)}</div></div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
