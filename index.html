<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monitoring Presensi Korwil Sine</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <!-- jsPDF & autoTable for PDF Export -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

  <style>
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    .loader { border-top-color: #3b82f6; animation: spinner 1.5s linear infinite; }
    @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .bg-late { background-color: #fef9c3 !important; }
    .bg-outside { background-color: #fee2e2 !important; }
    .bg-psw { background-color: #d1fae5 !important; }
    
    @keyframes slideInLeft {
      from { transform: translateX(-100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    .animate-slide-left { animation: slideInLeft 0.6s ease-out forwards; }
    .animate-slide-right { animation: slideInRight 0.6s ease-out forwards; }
  </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans antialiased">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // ==================== BACKEND COMMUNICATION (AMAN & TIDAK CRASH) ====================
    const BACKEND_URL = 'https://script.google.com/macros/s/AKfycbyjzVmFk2YosZLXEsSdAdDy0Y_2Qw6tGH-23Mj-94zmS7t9_sLfn2SHEUznbojwpyI-/exec';
    
    const runGoogleScript = async (funcName, ...args) => {
      try {
        const response = await fetch(BACKEND_URL, {
          method: 'POST',
          mode: 'cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ function: funcName, arguments: args })
        });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        if (data.error) throw new Error(data.error);
        return data.result;
      } catch (err) {
        console.error(`Error ${funcName}:`, err);
        // Fallback values untuk mencegah crash
        if (funcName === 'login') return { success: false };
        if (['getPresensi', 'getIjin', 'getPegawai', 'getActivityLogs', 'getPegawaiByLembaga'].includes(funcName)) return [];
        return { success: false };
      }
    };

    // ==================== FUNGSI PEMBANTU (TETAP SAMA) ====================
    const extractFileIdFromDriveUrl = (url) => {
      if (!url) return null;
      let match = url.match(/\/file\/d\/([^\/]+)/);
      if (match) return match[1];
      match = url.match(/[?&]id=([^&]+)/);
      if (match) return match[1];
      match = url.match(/\/d\/([^\/]+)\/preview/);
      return match ? match[1] : null;
    };

    const checkLateStatus = (waktuStr, jenisPresensi) => {
      if (!waktuStr || !jenisPresensi || jenisPresensi.toLowerCase() !== 'datang') return false;
      try {
        const parts = waktuStr.split('pukul ');
        if (parts.length < 2) return false;
        const timeString = parts[1].trim();
        const [hh, mm] = timeString.split(/[\.\:]/);
        const totalMinutes = (parseInt(hh,10) * 60) + parseInt(mm,10);
        return totalMinutes > 450;
      } catch { return false; }
    };

    const isOutsideRadius = (ketRadius) => ketRadius && ketRadius.toLowerCase().includes('luar radius');
    const isTidakHadir = (ketRadius) => ketRadius && (ketRadius.toLowerCase().includes('tidak hadir') || ketRadius.toLowerCase().includes('hari libur'));
    const normalizeName = (name) => name ? name.replace(/[^a-zA-Z0-9]/g, '').toLowerCase() : '';

    const parsePresensiDate = (waktuStr) => {
      if (!waktuStr) return null;
      const parts = waktuStr.split('pukul')[0].trim();
      const dateParts = parts.split(', ')[1];
      if (!dateParts) return null;
      const [day, monthName, year] = dateParts.split(' ');
      const monthMap = { 'Januari':1,'Februari':2,'Maret':3,'April':4,'Mei':5,'Juni':6,'Juli':7,'Agustus':8,'September':9,'Oktober':10,'November':11,'Desember':12 };
      const month = monthMap[monthName];
      if (!month) return null;
      return `${day.padStart(2,'0')}/${month.toString().padStart(2,'0')}/${year}`;
    };

    const dateToNumber = (dateStr) => {
      if (!dateStr) return null;
      const [dd, mm, yyyy] = dateStr.split('/').map(Number);
      return (dd && mm && yyyy) ? yyyy*10000 + mm*100 + dd : null;
    };

    const isDateInRangeNum = (dateStr, startNum, endNum) => {
      const d = dateToNumber(dateStr);
      return d !== null && d >= startNum && d <= endNum;
    };

    const parseIjinDate = (dateStr) => {
      if (!dateStr) return null;
      const [year, month, day] = dateStr.split('-');
      return (year && month && day) ? `${day.padStart(2,'0')}/${month.padStart(2,'0')}/${year}` : null;
    };

    const isDateInRange = (dateStr, startStr, endStr) => {
      if (!dateStr || !startStr || !endStr) return false;
      const toNum = (d) => { const [dd,mm,yyyy] = d.split('/').map(Number); return yyyy*10000 + mm*100 + dd; };
      const d = toNum(dateStr), s = toNum(startStr), e = toNum(endStr);
      return d >= s && d <= e;
    };

    const enrichPresensiWithIjin = (presensi, ijin) => {
      if (!presensi) return [];
      const approved = (ijin || []).filter(i => i.Status && i.Status.toLowerCase() === 'disetujui');
      return presensi.map(p => {
        const psw = approved.some(item => {
          if (normalizeName(p['Nama Pegawai']) !== normalizeName(item['Nama Pegawai'])) return false;
          const tglPresensi = parsePresensiDate(p['Waktu']);
          if (!tglPresensi) return false;
          const start = parseIjinDate(item['Tanggal Awal']);
          const end = parseIjinDate(item['Tanggal Berakir']);
          return start && end && isDateInRange(tglPresensi, start, end);
        });
        return { ...p, isPSW: psw, displayRadius: psw ? 'PSW' : p['Keterangan Radius'] };
      });
    };

    // ==================== KOMPONEN PAGINATION ====================
    const TablePagination = ({ currentPage, totalItems, rowsPerPage, onPageChange, onRowsPerPageChange }) => {
      const totalPages = Math.ceil(totalItems / rowsPerPage) || 1;
      const [jumpInput, setJumpInput] = useState('');
      const handleJump = () => {
        let page = parseInt(jumpInput,10);
        if (isNaN(page)) page = 1;
        page = Math.min(Math.max(page,1), totalPages);
        onPageChange(page);
        setJumpInput('');
      };
      return (
        <div className="flex flex-col sm:flex-row items-center justify-between mt-4 px-4 py-3 bg-white rounded-lg shadow-sm border gap-3">
          <div className="flex items-center gap-2">
            <span className="text-sm text-slate-600">Tampilkan</span>
            <select className="border rounded-lg px-2 py-1 text-sm" value={rowsPerPage} onChange={(e) => { const val = e.target.value === 'all' ? totalItems : Number(e.target.value); onRowsPerPageChange(val); onPageChange(1); }}>
              <option value={10}>10</option><option value={25}>25</option><option value={50}>50</option><option value={100}>100</option><option value="all">Semua</option>
            </select>
            <span className="text-sm text-slate-600">dari {totalItems} data</span>
          </div>
          <div className="flex items-center gap-2">
            <button onClick={() => onPageChange(currentPage-1)} disabled={currentPage===1} className={`px-3 py-1 rounded-lg text-sm font-medium ${currentPage===1 ? 'bg-slate-100 text-slate-400 cursor-not-allowed' : 'bg-slate-200 text-slate-700 hover:bg-slate-300'}`}>Previous</button>
            <span className="text-sm text-slate-700">Halaman {currentPage} dari {totalPages}</span>
            <button onClick={() => onPageChange(currentPage+1)} disabled={currentPage===totalPages || totalPages===0} className={`px-3 py-1 rounded-lg text-sm font-medium ${currentPage===totalPages || totalPages===0 ? 'bg-slate-100 text-slate-400 cursor-not-allowed' : 'bg-slate-200 text-slate-700 hover:bg-slate-300'}`}>Next</button>
          </div>
          <div className="flex items-center gap-2">
            <input type="number" min="1" max={totalPages} value={jumpInput} onChange={e=>setJumpInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleJump()} className="w-16 border rounded-lg px-2 py-1 text-sm text-center" placeholder="Halaman" />
            <button onClick={handleJump} className="px-3 py-1 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700">Go</button>
          </div>
        </div>
      );
    };

    // ==================== KOMPONEN LOGIN ====================
    const Login = ({ onLogin }) => {
      const [username, setUsername] = useState('');
      const [password, setPassword] = useState('');
      const [loading, setLoading] = useState(false);
      const handleSubmit = async (e) => {
        e.preventDefault();
        setLoading(true);
        const res = await runGoogleScript('login', username, password);
        if (res && res.success) onLogin(res.user);
        else Swal.fire('Error', 'Username atau password salah!', 'error');
        setLoading(false);
      };
      return (
        <div className="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-900 to-slate-800 px-4">
          <div className="bg-white rounded-3xl shadow-2xl w-full max-w-5xl overflow-hidden flex flex-col md:flex-row">
            <div className="md:w-1/2 p-8 lg:p-12 flex flex-col justify-center animate-slide-left">
              <div className="mb-8 text-center md:text-left"><div className="w-20 h-20 bg-blue-100 rounded-2xl flex items-center justify-center mx-auto md:mx-0 mb-4 shadow-lg"><i className="fas fa-fingerprint text-5xl text-blue-600"></i></div><h2 className="text-3xl font-black text-slate-800">Korwil Sine</h2><p className="text-slate-500 text-sm">Sistem Monitoring Presensi</p></div>
              <form onSubmit={handleSubmit} className="space-y-5">
                <div><label className="block text-xs font-bold uppercase text-slate-400 mb-1">Username</label><input type="text" required className="w-full px-5 py-4 border-2 border-slate-200 rounded-xl focus:ring-4 focus:ring-blue-200 focus:border-blue-600 outline-none transition" placeholder="Masukkan username" value={username} onChange={e=>setUsername(e.target.value)} /></div>
                <div><label className="block text-xs font-bold uppercase text-slate-400 mb-1">Password</label><input type="password" required className="w-full px-5 py-4 border-2 border-slate-200 rounded-xl focus:ring-4 focus:ring-blue-200 focus:border-blue-600 outline-none transition" placeholder="********" value={password} onChange={e=>setPassword(e.target.value)} /></div>
                <button type="submit" disabled={loading} className="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-xl font-black shadow-lg transition disabled:opacity-50 text-lg tracking-wider">{loading ? 'Memproses...' : 'MASUK'}</button>
              </form>
            </div>
            <div className="hidden md:flex md:w-1/2 bg-gradient-to-br from-blue-600 to-indigo-800 p-12 flex-col justify-center items-center text-white animate-slide-right">
              <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c8/Lambang_Kabupaten_Ngawi_%28svg%29.svg/1280px-Lambang_Kabupaten_Ngawi_%28svg%29.svg.png" alt="Logo Ngawi" className="w-48 h-48 object-contain mb-8 drop-shadow-2xl" onError={(e)=>{e.target.onerror=null; e.target.src='https://via.placeholder.com/200?text=Logo';}} />
              <h3 className="text-4xl font-black text-center leading-tight">Monitoring Presensi Korwil Sine</h3>
              <p className="text-lg text-center mt-4 text-blue-100">Dinas Pendidikan Kabupaten Ngawi</p>
              <div className="mt-8 flex gap-4 text-sm bg-white/20 py-3 px-6 rounded-full backdrop-blur-sm"><i className="fas fa-calendar-alt"></i><span>{new Date().toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'})}</span></div>
            </div>
          </div>
        </div>
      );
    };

    // ==================== KOMPONEN DASHBOARD PRESENSI (LENGKAP) ====================
    const Dashboard = ({ data, refreshData, userRole, userLembaga }) => {
      const [filterLembaga, setFilterLembaga] = useState('');
      const [filterNama, setFilterNama] = useState('');
      const [editingRow, setEditingRow] = useState(null);
      const [editVal, setEditVal] = useState('');
      const [modalImg, setModalImg] = useState(null);
      const [modalMap, setModalMap] = useState(null);
      const [currentPage, setCurrentPage] = useState(1);
      const [rowsPerPage, setRowsPerPage] = useState(10);
      const [showRangeModal, setShowRangeModal] = useState(false);
      const [rangeStart, setRangeStart] = useState('');
      const [rangeEnd, setRangeEnd] = useState('');
      const [rangeStatus, setRangeStatus] = useState('Libur');
      const [rangeKeterangan, setRangeKeterangan] = useState('');
      const [showCRUDModal, setShowCRUDModal] = useState(false);
      const [crudMode, setCrudMode] = useState('add');
      const [currentRowIndex, setCurrentRowIndex] = useState(null);
      const [formValues, setFormValues] = useState({ 'Hari Tanggal':'','Waktu':'','Jenis Presensi':'','Nama Lembaga':'','Nama Pegawai':'','Nip':'','Bukti Dukung':'','Latitude':'','Longitude':'','Jarak Absen':'','Keterangan Radius':'','Keterangan Bukti':'' });

      const canEditLembaga = ['Admin','User','Superuser'].includes(userRole);
      const canManageLibur = ['Admin','Superuser'].includes(userRole);
      const canViewBukti = ['Admin','User','Superuser'].includes(userRole);
      const isAdmin = userRole === 'Admin';

      useEffect(() => { if (!canEditLembaga && userLembaga) setFilterLembaga(userLembaga); }, [canEditLembaga, userLembaga]);
      const filtered = useMemo(() => data.filter(i => (i['Nama Lembaga']||'').toLowerCase().includes(filterLembaga.toLowerCase()) && (i['Nama Pegawai']||'').toLowerCase().includes(filterNama.toLowerCase())), [data, filterLembaga, filterNama]);
      useEffect(() => setCurrentPage(1), [filterLembaga, filterNama]);
      const totalItems = filtered.length;
      useEffect(() => { if (rowsPerPage > totalItems && totalItems>0) setRowsPerPage(totalItems); else if (totalItems===0) setRowsPerPage(10); }, [totalItems, rowsPerPage]);
      const effectiveRows = rowsPerPage === totalItems ? totalItems : rowsPerPage;
      const paginated = filtered.slice((currentPage-1)*effectiveRows, currentPage*effectiveRows);
      const stats = useMemo(() => {
        let datang=0,pulang=0,dalamRadius=0,luarRadius=0,psw=0,tidakHadir=0;
        filtered.forEach(i => {
          const jenis = (i['Jenis Presensi']||'').toLowerCase();
          const radius = (i.displayRadius || i['Keterangan Radius']||'').toLowerCase();
          if (jenis.includes('datang')) datang++;
          if (jenis.includes('pulang')) pulang++;
          if (radius.includes('luar radius')) luarRadius++;
          else if (radius.includes('dalam radius')) dalamRadius++;
          else if (radius === 'psw') psw++;
          else if (radius.includes('tidak hadir')||radius.includes('hari libur')) tidakHadir++;
        });
        return { datang,pulang,dalamRadius,luarRadius,psw,tidakHadir };
      }, [filtered]);

      const handleSaveKet = async (idx) => { const res = await runGoogleScript('updateKeteranganBukti', idx, editVal); if (res.success) { Swal.fire({icon:'success',title:'Tersimpan',timer:1000,showConfirmButton:false}); setEditingRow(null); refreshData(); } };
      const openAddModal = () => { setCrudMode('add'); setCurrentRowIndex(null); setFormValues({'Hari Tanggal':'','Waktu':'','Jenis Presensi':'','Nama Lembaga':'','Nama Pegawai':'','Nip':'','Bukti Dukung':'','Latitude':'','Longitude':'','Jarak Absen':'','Keterangan Radius':'','Keterangan Bukti':''}); setShowCRUDModal(true); };
      const openEditModal = (item) => { setCrudMode('edit'); setCurrentRowIndex(item._rowIndex); setFormValues(item); setShowCRUDModal(true); };
      const handleDelete = async (rowIndex, nama) => { const confirm = await Swal.fire({title:'Hapus Presensi?',text:`Yakin hapus data ${nama}?`,icon:'warning',showCancelButton:true,confirmButtonColor:'#d33',confirmButtonText:'Ya, Hapus'}); if(confirm.isConfirmed){ const loading = Swal.fire({title:'Menghapus...',allowOutsideClick:false,didOpen:()=>Swal.showLoading()}); const res = await runGoogleScript('deletePresensi', rowIndex); loading.close(); if(res.success){ Swal.fire({icon:'success',title:'Terhapus',timer:1500,showConfirmButton:false}); refreshData(); } else Swal.fire('Error','Gagal hapus','error'); } };
      const handleSubmitCRUD = async () => { if(!formValues['Waktu'] || !formValues['Jenis Presensi'] || !formValues['Nama Pegawai']) return Swal.fire('Peringatan','Waktu, Jenis, Nama Pegawai wajib','warning'); const loading = Swal.fire({title:'Menyimpan...',allowOutsideClick:false,didOpen:()=>Swal.showLoading()}); let res; if(crudMode==='add') res = await runGoogleScript('addPresensi', formValues); else res = await runGoogleScript('updatePresensi', currentRowIndex, formValues); loading.close(); if(res.success){ Swal.fire({icon:'success',title:crudMode==='add'?'Ditambahkan':'Diperbarui',timer:1500,showConfirmButton:false}); setShowCRUDModal(false); refreshData(); } else Swal.fire('Error','Gagal simpan','error'); };

      return (
        <div className="space-y-6">
          <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4">
            <div className="bg-white p-5 rounded-2xl shadow-sm border flex items-center gap-4"><div className="w-12 h-12 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center text-xl"><i className="fas fa-sign-in-alt"></i></div><div><p className="text-xs text-slate-500 font-bold uppercase">Absen Datang</p><p className="text-2xl font-black text-slate-800">{stats.datang}</p></div></div>
            <div className="bg-white p-5 rounded-2xl shadow-sm border flex items-center gap-4"><div className="w-12 h-12 rounded-full bg-yellow-100 text-yellow-600 flex items-center justify-center text-xl"><i className="fas fa-sign-out-alt"></i></div><div><p className="text-xs text-slate-500 font-bold uppercase">Absen Pulang</p><p className="text-2xl font-black text-slate-800">{stats.pulang}</p></div></div>
            <div className="bg-white p-5 rounded-2xl shadow-sm border flex items-center gap-4"><div className="w-12 h-12 rounded-full bg-emerald-100 text-emerald-600 flex items-center justify-center text-xl"><i className="fas fa-map-marker-alt"></i></div><div><p className="text-xs text-slate-500 font-bold uppercase">Dalam Radius</p><p className="text-2xl font-black text-slate-800">{stats.dalamRadius}</p></div></div>
            <div className="bg-white p-5 rounded-2xl shadow-sm border flex items-center gap-4"><div className="w-12 h-12 rounded-full bg-red-100 text-red-600 flex items-center justify-center text-xl"><i className="fas fa-exclamation-triangle"></i></div><div><p className="text-xs text-slate-500 font-bold uppercase">Luar Radius</p><p className="text-2xl font-black text-slate-800">{stats.luarRadius}</p></div></div>
            <div className="bg-white p-5 rounded-2xl shadow-sm border flex items-center gap-4"><div className="w-12 h-12 rounded-full bg-green-100 text-green-600 flex items-center justify-center text-xl"><i className="fas fa-check-circle"></i></div><div><p className="text-xs text-slate-500 font-bold uppercase">PSW</p><p className="text-2xl font-black text-slate-800">{stats.psw}</p></div></div>
            <div className="bg-white p-5 rounded-2xl shadow-sm border flex items-center gap-4"><div className="w-12 h-12 rounded-full bg-gray-100 text-gray-600 flex items-center justify-center text-xl"><i className="fas fa-ban"></i></div><div><p className="text-xs text-slate-500 font-bold uppercase">Tidak Hadir</p><p className="text-2xl font-black text-slate-800">{stats.tidakHadir}</p></div></div>
          </div>
          <div className="bg-white p-5 rounded-2xl shadow-sm border flex flex-wrap gap-4 items-center">
            <h3 className="font-bold text-lg text-slate-700 w-full md:w-auto mr-4">Filter Data:</h3>
            <input type="text" placeholder="Cari Lembaga..." className={`border p-3 rounded-xl flex-1 text-sm outline-none focus:border-blue-500 ${!canEditLembaga ? 'bg-slate-100 cursor-not-allowed' : ''}`} value={filterLembaga} onChange={e=>canEditLembaga&&setFilterLembaga(e.target.value)} disabled={!canEditLembaga} />
            <input type="text" placeholder="Cari Nama Pegawai..." className="border p-3 rounded-xl flex-1 text-sm outline-none focus:border-blue-500" value={filterNama} onChange={e=>setFilterNama(e.target.value)} />
            {!canEditLembaga && userLembaga && <span className="text-xs text-blue-600 bg-blue-50 px-2 py-1 rounded-full"><i className="fas fa-lock mr-1"></i> Filter lembaga dikunci</span>}
            {canManageLibur && <button onClick={()=>setShowRangeModal(true)} className="bg-purple-600 hover:bg-purple-700 text-white px-5 py-3 rounded-xl font-bold shadow-sm flex items-center gap-2"><i className="fas fa-calendar-alt"></i> Atur Libur Manual</button>}
            {isAdmin && <button onClick={openAddModal} className="bg-green-600 hover:bg-green-700 text-white px-5 py-3 rounded-xl font-bold shadow-sm flex items-center gap-2"><i className="fas fa-plus-circle"></i> Tambah Presensi</button>}
          </div>
          <div className="bg-white rounded-2xl shadow-sm border overflow-hidden">
            <div className="overflow-x-auto">
              <table className="w-full text-sm text-left">
                <thead className="bg-slate-800 text-white border-b"><tr><th className="px-4 py-4">Waktu Presensi</th><th className="px-4 py-4">Lembaga</th><th className="px-4 py-4">Pegawai</th><th className="px-4 py-4 text-center">Bukti/Map</th><th className="px-4 py-4">Radius Status</th><th className="px-4 py-4">Ket. Bukti</th>{isAdmin && <th className="px-4 py-4 text-center">Aksi</th>}</tr></thead>
                <tbody className="divide-y">
                  {paginated.map((item,i) => {
                    const outRadius = isOutsideRadius(item.displayRadius);
                    const late = checkLateStatus(item['Waktu'], item['Jenis Presensi']);
                    const tidakHadir = isTidakHadir(item.displayRadius);
                    const isPSW = item.isPSW;
                    let bgClass = "bg-white";
                    if (isPSW) bgClass = "bg-psw hover:bg-green-200";
                    else if (tidakHadir) bgClass = "bg-black text-white";
                    else if (outRadius) bgClass = "bg-outside hover:bg-red-200";
                    else if (late) bgClass = "bg-late hover:bg-yellow-200";
                    return (
                      <tr key={i} className={`${bgClass} transition-colors text-slate-700`}>
                        <td className="px-4 py-3 whitespace-nowrap"><span className="font-medium block">{item['Waktu']}</span><span className="text-[10px] px-1.5 py-0.5 bg-slate-200 rounded text-slate-600 font-bold uppercase">{item['Jenis Presensi']}</span></td>
                        <td className="px-4 py-3">{item['Nama Lembaga']}</td>
                        <td className="px-4 py-3"><div className="font-bold">{item['Nama Pegawai']}</div><div className="text-xs opacity-70">{item['Nip']}</div></td>
                        <td className="px-4 py-3 text-center"><div className="flex justify-center gap-2">{canViewBukti ? <button onClick={()=>setModalImg(item['Bukti Dukung'])} className="w-8 h-8 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center hover:bg-blue-200"><i className="fas fa-image"></i></button> : <span className="w-8 h-8 rounded-full bg-slate-100 text-slate-400 flex items-center justify-center cursor-not-allowed"><i className="fas fa-lock"></i></span>}<button onClick={()=>setModalMap({lat:item.Latitude, lng:item.Longitude})} className="w-8 h-8 rounded-full bg-emerald-100 text-emerald-600 flex items-center justify-center hover:bg-emerald-200"><i className="fas fa-map-marker-alt"></i></button></div></td>
                        <td className="px-4 py-3"><span className={`px-2 py-1 rounded text-[10px] font-black uppercase ${isPSW ? 'bg-green-600 text-white' : tidakHadir ? 'bg-black text-white' : outRadius ? 'bg-red-600 text-white' : 'bg-green-600 text-white'}`}>{item.displayRadius}</span><div className="text-[10px] mt-1 text-slate-500 font-medium">{item['Jarak Absen']}</div></td>
                        <td className="px-4 py-3 min-w-[150px]">{editingRow===item._rowIndex ? <div className="flex gap-1"><input className="border p-1 rounded text-xs flex-1" value={editVal} onChange={e=>setEditVal(e.target.value)} autoFocus /><button onClick={()=>handleSaveKet(item._rowIndex)} className="bg-green-600 text-white px-2 py-1 rounded"><i className="fas fa-check"></i></button></div> : <div className="flex justify-between items-center group cursor-pointer" onClick={()=>{setEditingRow(item._rowIndex); setEditVal(item['Keterangan Bukti']||'');}}><span className="truncate max-w-[120px]">{item['Keterangan Bukti']||'-'}</span><i className="fas fa-pencil-alt text-slate-300 group-hover:text-blue-500 text-xs transition"></i></div>}</td>
                        {isAdmin && <td className="px-4 py-3 text-center"><div className="flex gap-2 justify-center"><button onClick={()=>openEditModal(item)} className="text-blue-600 hover:bg-blue-50 w-8 h-8 rounded-lg"><i className="fas fa-edit"></i></button><button onClick={()=>handleDelete(item._rowIndex, item['Nama Pegawai'])} className="text-red-600 hover:bg-red-50 w-8 h-8 rounded-lg"><i className="fas fa-trash-alt"></i></button></div></td>}
                      </tr>
                    );
                  })}
                  {paginated.length===0 && <tr><td colSpan={isAdmin?7:6} className="text-center py-10 text-slate-400 italic">Data tidak ditemukan</td></tr>}
                </tbody>
              </table>
            </div>
            <TablePagination currentPage={currentPage} totalItems={totalItems} rowsPerPage={rowsPerPage} onPageChange={setCurrentPage} onRowsPerPageChange={setRowsPerPage} />
          </div>
          {/* Modal Image */}
          {modalImg && <div className="fixed inset-0 z-50 bg-black/80 flex items-center justify-center p-4" onClick={()=>setModalImg(null)}><div className="relative max-w-4xl w-full bg-white rounded-xl shadow-2xl overflow-hidden" onClick={e=>e.stopPropagation()}><div className="p-4 flex justify-between items-center bg-slate-800 text-white"><h4 className="font-bold"><i className="fas fa-file-image text-blue-400"></i> Bukti Dukung</h4><button onClick={()=>setModalImg(null)} className="text-3xl leading-none">&times;</button></div><div className="w-full h-[80vh] bg-slate-100 flex items-center justify-center">{modalImg.includes('drive.google.com') ? <iframe src={`https://drive.google.com/file/d/${extractFileIdFromDriveUrl(modalImg)}/preview`} className="w-full h-full" allow="autoplay" sandbox="allow-same-origin allow-scripts"></iframe> : <img src={modalImg} alt="Bukti" className="w-full h-full object-contain" onError={(e)=>{e.target.onerror=null; e.target.parentNode.innerHTML='<div class="flex flex-col items-center justify-center h-full p-8"><i class="fas fa-exclamation-triangle text-4xl text-red-500 mb-4"></i><p class="text-lg font-bold">Gambar tidak dapat ditampilkan</p></div>';}} />}</div></div></div>}
          {/* Modal Map */}
          {modalMap && <div className="fixed inset-0 z-50 bg-black/80 flex items-center justify-center p-4" onClick={()=>setModalMap(null)}><div className="w-full max-w-3xl bg-white rounded-2xl overflow-hidden shadow-2xl" onClick={e=>e.stopPropagation()}><div className="p-4 flex justify-between items-center bg-slate-800 text-white"><h4 className="font-bold"><i className="fas fa-map-marked-alt text-blue-400"></i> Lokasi Presensi</h4><button onClick={()=>setModalMap(null)} className="text-3xl leading-none">&times;</button></div><iframe width="100%" height="450" frameBorder="0" style={{border:0}} src={`https://maps.google.com/maps?q=${modalMap.lat},${modalMap.lng}&z=16&output=embed`} allowFullScreen></iframe></div></div>}
          {/* Modal Atur Libur */}
          {showRangeModal && <div className="fixed inset-0 z-50 bg-black/80 flex items-center justify-center p-4" onClick={()=>setShowRangeModal(false)}><div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg" onClick={e=>e.stopPropagation()}><div className="p-6 border-b flex justify-between items-center bg-slate-800 text-white"><h4 className="text-xl font-bold"><i className="fas fa-calendar-alt text-purple-400"></i> Atur Libur Manual</h4><button onClick={()=>setShowRangeModal(false)} className="text-3xl leading-none">&times;</button></div><div className="p-6 space-y-4"><div><label className="block text-xs font-bold uppercase text-slate-500 mb-1">Tanggal Awal</label><input type="date" className="w-full border p-3 rounded-xl" value={rangeStart} onChange={e=>setRangeStart(e.target.value)} /></div><div><label className="block text-xs font-bold uppercase text-slate-500 mb-1">Tanggal Akhir</label><input type="date" className="w-full border p-3 rounded-xl" value={rangeEnd} onChange={e=>setRangeEnd(e.target.value)} /></div><div><label className="block text-xs font-bold uppercase text-slate-500 mb-1">Status</label><select className="w-full border p-3 rounded-xl" value={rangeStatus} onChange={e=>setRangeStatus(e.target.value)}><option value="Libur">Libur</option><option value="Cuti Bersama">Cuti Bersama</option><option value="Izin">Izin</option><option value="Sakit">Sakit</option></select></div><div><label className="block text-xs font-bold uppercase text-slate-500 mb-1">Keterangan</label><textarea className="w-full border p-3 rounded-xl" rows="3" value={rangeKeterangan} onChange={e=>setRangeKeterangan(e.target.value)} placeholder="Misal: Libur Nasional"></textarea></div><div className="flex justify-end gap-3 pt-4"><button onClick={()=>setShowRangeModal(false)} className="px-6 py-3 border-2 border-slate-300 rounded-xl font-bold text-slate-600">Batal</button><button onClick={async()=>{ if(!rangeStart||!rangeEnd) return Swal.fire('Peringatan','Tanggal awal dan akhir harus diisi','warning'); const loading = Swal.fire({title:'Memproses...',allowOutsideClick:false,didOpen:()=>Swal.showLoading()}); const res = await runGoogleScript('setStatusRentang', rangeStart, rangeEnd, rangeStatus, rangeKeterangan); loading.close(); if(res.success){ Swal.fire({icon:'success',title:'Berhasil',text:`${res.updated} data diupdate`}); setShowRangeModal(false); refreshData(); } else Swal.fire('Error','Gagal update','error'); }} className="px-6 py-3 bg-purple-600 text-white rounded-xl font-bold shadow-lg hover:bg-purple-700">Terapkan</button></div></div></div></div>}
          {/* Modal CRUD */}
          {showCRUDModal && <div className="fixed inset-0 z-50 bg-black/80 flex items-center justify-center p-4" onClick={()=>setShowCRUDModal(false)}><div className="bg-white rounded-2xl shadow-2xl w-full max-w-4xl max-h-[90vh] overflow-y-auto" onClick={e=>e.stopPropagation()}><div className="p-6 border-b flex justify-between items-center bg-slate-800 text-white sticky top-0"><h4 className="text-xl font-bold"><i className={`fas ${crudMode==='add'?'fa-plus-circle':'fa-edit'} text-blue-400`}></i> {crudMode==='add'?'Tambah Presensi Baru':'Edit Presensi'}</h4><button onClick={()=>setShowCRUDModal(false)} className="text-3xl leading-none">&times;</button></div><div className="p-6 space-y-4"><div className="grid grid-cols-1 md:grid-cols-2 gap-4"><div><label className="block text-xs font-bold uppercase text-slate-500 mb-1">Hari Tanggal</label><input type="text" name="Hari Tanggal" value={formValues['Hari Tanggal']} onChange={e=>setFormValues({...formValues,'Hari Tanggal':e.target.value})} className="w-full border p-3 rounded-xl" /></div><div><label className="block text-xs font-bold uppercase text-slate-500 mb-1">Waktu *</label><input type="text" name="Waktu" value={formValues['Waktu']} onChange={e=>setFormValues({...formValues,'Waktu':e.target.value})} className="w-full border p-3 rounded-xl" required /></div><div><label className="block text-xs font-bold uppercase text-slate-500 mb-1">Jenis Presensi *</label><select name="Jenis Presensi" value={formValues['Jenis Presensi']} onChange={e=>setFormValues({...formValues,'Jenis Presensi':e.target.value})} className="w-full border p-3 rounded-xl"><option value="">Pilih</option><option value="Datang">Datang</option><option value="Pulang">Pulang</option></select></div><div><label className="block text-xs font-bold uppercase text-slate-500 mb-1">Nama Lembaga</label><input type="text" name="Nama Lembaga" value={formValues['Nama Lembaga']} onChange={e=>setFormValues({...formValues,'Nama Lembaga':e.target.value})} className="w-full border p-3 rounded-xl" /></div><div><label className="block text-xs font-bold uppercase text-slate-500 mb-1">Nama Pegawai *</label><input type="text" name="Nama Pegawai" value={formValues['Nama Pegawai']} onChange={e=>setFormValues({...formValues,'Nama Pegawai':e.target.value})} className="w-full border p-3 rounded-xl" required /></div><div><label className="block text-xs font-bold uppercase text-slate-500 mb-1">Nip</label><input type="text" name="Nip" value={formValues['Nip']} onChange={e=>setFormValues({...formValues,'Nip':e.target.value})} className="w-full border p-3 rounded-xl" /></div><div><label className="block text-xs font-bold uppercase text-slate-500 mb-1">Bukti Dukung (URL)</label><input type="text" name="Bukti Dukung" value={formValues['Bukti Dukung']} onChange={e=>setFormValues({...formValues,'Bukti Dukung':e.target.value})} className="w-full border p-3 rounded-xl" /></div><div><label className="block text-xs font-bold uppercase text-slate-500 mb-1">Latitude</label><input type="text" name="Latitude" value={formValues['Latitude']} onChange={e=>setFormValues({...formValues,'Latitude':e.target.value})} className="w-full border p-3 rounded-xl" /></div><div><label className="block text-xs font-bold uppercase text-slate-500 mb-1">Longitude</label><input type="text" name="Longitude" value={formValues['Longitude']} onChange={e=>setFormValues({...formValues,'Longitude':e.target.value})} className="w-full border p-3 rounded-xl" /></div><div><label className="block text-xs font-bold uppercase text-slate-500 mb-1">Jarak Absen</label><input type="text" name="Jarak Absen" value={formValues['Jarak Absen']} onChange={e=>setFormValues({...formValues,'Jarak Absen':e.target.value})} className="w-full border p-3 rounded-xl" /></div><div><label className="block text-xs font-bold uppercase text-slate-500 mb-1">Keterangan Radius</label><input type="text" name="Keterangan Radius" value={formValues['Keterangan Radius']} onChange={e=>setFormValues({...formValues,'Keterangan Radius':e.target.value})} className="w-full border p-3 rounded-xl" /></div><div><label className="block text-xs font-bold uppercase text-slate-500 mb-1">Keterangan Bukti</label><input type="text" name="Keterangan Bukti" value={formValues['Keterangan Bukti']} onChange={e=>setFormValues({...formValues,'Keterangan Bukti':e.target.value})} className="w-full border p-3 rounded-xl" /></div></div><div className="flex justify-end gap-3 pt-4 border-t"><button onClick={()=>setShowCRUDModal(false)} className="px-6 py-3 border-2 border-slate-300 rounded-xl font-bold text-slate-600">Batal</button><button onClick={handleSubmitCRUD} className="px-6 py-3 bg-blue-600 text-white rounded-xl font-bold shadow-lg hover:bg-blue-700">Simpan</button></div></div></div></div>}
        </div>
      );
    };

    // ==================== KOMPONEN DOKUMEN IJIN ====================
    const DokumenIjin = ({ data, refreshData, userRole, userLembaga }) => {
      const [modalPdf, setModalPdf] = useState(null);
      const [editRow, setEditRow] = useState(null);
      const [status, setStatus] = useState('');
      const [ket, setKet] = useState('');
      const [filterLembaga, setFilterLembaga] = useState('');
      const [filterNama, setFilterNama] = useState('');
      const [currentPage, setCurrentPage] = useState(1);
      const [rowsPerPage, setRowsPerPage] = useState(10);
      const canEditLembaga = ['Admin','User','Superuser'].includes(userRole);
      const canEditData = ['Admin','User','Superuser'].includes(userRole);
      useEffect(() => { if (!canEditLembaga && userLembaga) setFilterLembaga(userLembaga); }, [canEditLembaga, userLembaga]);
      const filtered = useMemo(() => data.filter(i => (i['Nama Lembaga']||'').toLowerCase().includes(filterLembaga.toLowerCase()) && (i['Nama Pegawai']||'').toLowerCase().includes(filterNama.toLowerCase())), [data, filterLembaga, filterNama]);
      useEffect(() => setCurrentPage(1), [filterLembaga, filterNama]);
      const totalItems = filtered.length;
      useEffect(() => { if (rowsPerPage > totalItems && totalItems>0) setRowsPerPage(totalItems); else if (totalItems===0) setRowsPerPage(10); }, [totalItems, rowsPerPage]);
      const effectiveRows = rowsPerPage === totalItems ? totalItems : rowsPerPage;
      const paginated = filtered.slice((currentPage-1)*effectiveRows, currentPage*effectiveRows);
      const handleSave = async (idx) => { const res = await runGoogleScript('updateDokumenIjin', idx, status, ket); if (res.success) { Swal.fire({icon:'success',title:'Berhasil Update',timer:1000,showConfirmButton:false}); setEditRow(null); refreshData(); } };
      const handleDelete = async (rowIndex, nama) => { const confirm = await Swal.fire({title:'Hapus Dokumen Ijin?',text:`Yakin hapus pengajuan ${nama}?`,icon:'warning',showCancelButton:true,confirmButtonColor:'#d33',confirmButtonText:'Ya, Hapus'}); if(confirm.isConfirmed){ const res = await runGoogleScript('deleteDokumenIjin', rowIndex); if(res.success){ Swal.fire('Terhapus','Data berhasil dihapus','success'); refreshData(); } else Swal.fire('Error','Gagal hapus','error'); } };
      return (
        <div className="space-y-6">
          <div className="bg-white p-5 rounded-2xl shadow-sm border flex flex-wrap gap-4 items-center"><h3 className="font-bold text-lg text-slate-700 w-full md:w-auto mr-4">Filter Dokumen Ijin:</h3><input type="text" placeholder="Cari Lembaga..." className={`border p-3 rounded-xl flex-1 text-sm ${!canEditLembaga?'bg-slate-100 cursor-not-allowed':''}`} value={filterLembaga} onChange={e=>canEditLembaga&&setFilterLembaga(e.target.value)} disabled={!canEditLembaga} /><input type="text" placeholder="Cari Nama Pegawai..." className="border p-3 rounded-xl flex-1 text-sm" value={filterNama} onChange={e=>setFilterNama(e.target.value)} />{!canEditLembaga && userLembaga && <span className="text-xs text-blue-600 bg-blue-50 px-2 py-1 rounded-full"><i className="fas fa-lock mr-1"></i> Filter lembaga dikunci</span>}</div>
          <div className="bg-white rounded-2xl shadow-sm border overflow-hidden"><div className="overflow-x-auto"><table className="w-full text-sm text-left"><thead className="bg-slate-800 text-white border-b"><tr><th className="px-4 py-4">Nama Pegawai</th><th className="px-4 py-4">Jenis Ijin</th><th className="px-4 py-4">Tanggal Awal</th><th className="px-4 py-4">Tanggal Akhir</th><th className="px-4 py-4 text-center">File</th><th className="px-4 py-4">Status</th><th className="px-4 py-4">Keterangan</th>{canEditData && <th className="px-4 py-4 text-center">Aksi</th>}</tr></thead><tbody className="divide-y text-slate-700">{paginated.map((item,i)=>(<tr key={i} className="hover:bg-slate-50"><td className="px-4 py-3"><div className="font-bold">{item['Nama Pegawai']}</div><div className="text-[10px] text-slate-500">{item['Nama Lembaga']}</div></td><td className="px-4 py-3 font-medium text-blue-600">{item['Jenis Ijin']}</td><td className="px-4 py-3">{item['Tanggal Awal']||'-'}</td><td className="px-4 py-3">{item['Tanggal Berakir']||'-'}</td><td className="px-4 py-3 text-center"><button onClick={()=>setModalPdf(item['File URL'])} className="bg-red-600 text-white px-3 py-1.5 rounded-lg text-[10px] font-black hover:bg-red-700 flex items-center gap-1 mx-auto"><i className="fas fa-file-pdf"></i> PDF</button></td><td className="px-4 py-3">{editRow===item._rowIndex && canEditData ? <select className="border p-1 rounded w-full text-xs" value={status} onChange={e=>setStatus(e.target.value)}><option value="Diajukan">Diajukan</option><option value="DiSetujui">DiSetujui</option><option value="Ditolak">Ditolak</option></select> : <span className={`px-2 py-1 rounded text-[10px] font-black uppercase ${item.Status && item.Status.toLowerCase()==='disetujui' ? 'bg-green-100 text-green-700' : item.Status && item.Status.toLowerCase()==='ditolak' ? 'bg-red-100 text-red-700' : 'bg-blue-100 text-blue-700'}`}>{item.Status||'-'}</span>}</td><td className="px-4 py-3">{editRow===item._rowIndex && canEditData ? <input className="border p-1 rounded w-full text-xs" value={ket} onChange={e=>setKet(e.target.value)} placeholder="Tulis catatan..." /> : <span className="text-slate-500 italic">{item.Keterangan||'-'}</span>}</td>{canEditData && <td className="px-4 py-3"><div className="flex gap-2">{editRow===item._rowIndex ? <button onClick={()=>handleSave(item._rowIndex)} className="bg-green-600 text-white w-8 h-8 rounded-lg shadow-md flex items-center justify-center"><i className="fas fa-save"></i></button> : <><button onClick={()=>{setEditRow(item._rowIndex); setStatus(item.Status); setKet(item.Keterangan);}} className="text-slate-400 hover:text-blue-600 w-8 h-8 rounded-lg"><i className="fas fa-edit"></i></button><button onClick={()=>handleDelete(item._rowIndex, item['Nama Pegawai'])} className="text-red-400 hover:text-red-600 w-8 h-8 rounded-lg"><i className="fas fa-trash-alt"></i></button></>}</div></td>}</tr>))}{paginated.length===0 && <tr><td colSpan={canEditData?8:7} className="text-center py-10 text-slate-400 italic">Tidak ada data dokumen ijin</td></tr>}</tbody></table></div><TablePagination currentPage={currentPage} totalItems={totalItems} rowsPerPage={rowsPerPage} onPageChange={setCurrentPage} onRowsPerPageChange={setRowsPerPage} /></div>
          {modalPdf && <div className="fixed inset-0 z-50 bg-black/80 flex items-center justify-center p-4" onClick={()=>setModalPdf(null)}><div className="w-full max-w-5xl h-[90vh] bg-white rounded-2xl overflow-hidden flex flex-col shadow-2xl" onClick={e=>e.stopPropagation()}><div className="p-4 flex justify-between bg-slate-800 text-white"><span className="font-bold"><i className="fas fa-file-pdf text-red-400"></i> Pratinjau Dokumen</span><button onClick={()=>setModalPdf(null)} className="text-2xl leading-none">&times;</button></div><iframe src={modalPdf.replace('/view','/preview')} className="flex-1 w-full border-none" sandbox="allow-same-origin allow-scripts"></iframe></div></div>}
        </div>
      );
    };

    // ==================== KOMPONEN DATABASE PEGAWAI ====================
    const DatabasePegawai = ({ refreshParent, userRole }) => {
      const [data, setData] = useState([]);
      const [loading, setLoading] = useState(false);
      const [filterLembaga, setFilterLembaga] = useState('');
      const [filterNama, setFilterNama] = useState('');
      const [modalOpen, setModalOpen] = useState(false);
      const [editingRow, setEditingRow] = useState(null);
      const [formData, setFormData] = useState({ 'Username (MP/ID)':'','Password':'','Name Lembaga':'','Name Pegawai':'','Latitude':'','Longitude':'','Radius (m)':'','Role':'' });
      const [currentPage, setCurrentPage] = useState(1);
      const [rowsPerPage, setRowsPerPage] = useState(10);
      const canManage = ['Admin','Superuser'].includes(userRole);
      const fetchData = async () => { setLoading(true); const res = await runGoogleScript('getPegawai'); setData(res || []); setLoading(false); };
      useEffect(() => { fetchData(); }, []);
      const filtered = useMemo(() => data.filter(i => (i['Name Lembaga']||'').toLowerCase().includes(filterLembaga.toLowerCase()) && (i['Name Pegawai']||'').toLowerCase().includes(filterNama.toLowerCase())), [data, filterLembaga, filterNama]);
      useEffect(() => setCurrentPage(1), [filterLembaga, filterNama]);
      const totalItems = filtered.length;
      useEffect(() => { if (rowsPerPage > totalItems && totalItems>0) setRowsPerPage(totalItems); else if (totalItems===0) setRowsPerPage(10); }, [totalItems, rowsPerPage]);
      const effectiveRows = rowsPerPage === totalItems ? totalItems : rowsPerPage;
      const paginated = filtered.slice((currentPage-1)*effectiveRows, currentPage*effectiveRows);
      const openModal = (item=null) => { if(!canManage) return Swal.fire('Akses Ditolak','Hanya Admin/Superuser','warning'); if(item){ setFormData(item); setEditingRow(item._rowIndex); } else { setFormData({'Username (MP/ID)':'','Password':'','Name Lembaga':'','Name Pegawai':'','Latitude':'','Longitude':'','Radius (m)':'','Role':''}); setEditingRow(null); } setModalOpen(true); };
      const handleInputChange = (e) => setFormData({...formData, [e.target.name]: e.target.value});
      const handleSubmit = async () => { if(!formData['Username (MP/ID)'] || !formData['Password'] || !formData['Name Pegawai']) return Swal.fire('Peringatan','Username, Password, Nama Pegawai harus diisi','warning'); setLoading(true); let res; if(editingRow) res = await runGoogleScript('updatePegawai', editingRow, formData); else res = await runGoogleScript('addPegawai', formData); if(res.success){ Swal.fire({icon:'success',title:'Berhasil',timer:1500,showConfirmButton:false}); setModalOpen(false); fetchData(); if(refreshParent) refreshParent(); } else Swal.fire('Error','Gagal menyimpan','error'); setLoading(false); };
      const handleDelete = async (rowIndex, nama) => { if(!canManage) return; const confirm = await Swal.fire({title:'Hapus Pegawai?',text:`Yakin hapus ${nama}?`,icon:'warning',showCancelButton:true,confirmButtonColor:'#d33',confirmButtonText:'Ya, Hapus'}); if(confirm.isConfirmed){ setLoading(true); const res = await runGoogleScript('deletePegawai', rowIndex); if(res.success){ Swal.fire('Terhapus','Data pegawai dihapus','success'); fetchData(); } else Swal.fire('Error','Gagal hapus','error'); setLoading(false); } };
      return (
        <div className="space-y-6">
          <div className="bg-white p-5 rounded-2xl shadow-sm border flex flex-wrap justify-between items-center"><h3 className="font-bold text-xl text-slate-800"><i className="fas fa-database text-blue-600"></i> Database Pegawai</h3>{canManage ? <button onClick={()=>openModal()} className="bg-blue-600 hover:bg-blue-700 text-white px-5 py-3 rounded-xl font-bold shadow-lg"><i className="fas fa-plus-circle"></i> Tambah Pegawai</button> : <div className="text-sm text-red-600 font-semibold bg-red-50 px-4 py-2 rounded-xl"><i className="fas fa-lock mr-2"></i>Hanya Admin/Superuser</div>}</div>
          <div className="bg-white p-5 rounded-2xl shadow-sm border flex flex-wrap gap-4 items-center"><h4 className="font-bold text-slate-700 mr-2">Filter:</h4><input type="text" placeholder="Cari Lembaga..." className="border p-3 rounded-xl flex-1 text-sm" value={filterLembaga} onChange={e=>setFilterLembaga(e.target.value)} /><input type="text" placeholder="Cari Nama Pegawai..." className="border p-3 rounded-xl flex-1 text-sm" value={filterNama} onChange={e=>setFilterNama(e.target.value)} /></div>
          <div className="bg-white rounded-2xl shadow-sm border overflow-hidden"><div className="overflow-x-auto"><table className="w-full text-sm text-left"><thead className="bg-slate-800 text-white border-b"><tr><th className="px-4 py-4">Username</th><th className="px-4 py-4">Password</th><th className="px-4 py-4">Lembaga</th><th className="px-4 py-4">Nama Pegawai</th><th className="px-4 py-4">Latitude</th><th className="px-4 py-4">Longitude</th><th className="px-4 py-4">Radius (m)</th><th className="px-4 py-4">Role</th>{canManage && <th className="px-4 py-4 text-center">Aksi</th>}</tr></thead><tbody className="divide-y">{paginated.map((item,i)=> (<tr key={i} className="hover:bg-slate-50"><td className="px-4 py-3 font-medium">{item['Username (MP/ID)']}</td><td className="px-4 py-3">••••••</td><td className="px-4 py-3">{item['Name Lembaga']}</td><td className="px-4 py-3 font-bold">{item['Name Pegawai']}</td><td className="px-4 py-3">{item['Latitude']}</td><td className="px-4 py-3">{item['Longitude']}</td><td className="px-4 py-3">{item['Radius (m)']}</td><td className="px-4 py-3"><span className="px-2 py-1 bg-blue-100 text-blue-800 rounded text-[10px] font-black uppercase">{item['Role']}</span></td>{canManage && <td className="px-4 py-3"><div className="flex justify-center gap-2"><button onClick={()=>openModal(item)} className="text-blue-600 hover:bg-blue-50 w-8 h-8 rounded-lg"><i className="fas fa-edit"></i></button><button onClick={()=>handleDelete(item._rowIndex, item['Name Pegawai'])} className="text-red-600 hover:bg-red-50 w-8 h-8 rounded-lg"><i className="fas fa-trash-alt"></i></button></div></td>}</tr>))}{paginated.length===0 && <tr><td colSpan={canManage?9:8} className="text-center py-10 text-slate-400 italic">Tidak ada data pegawai</td></tr>}</tbody></table></div><TablePagination currentPage={currentPage} totalItems={totalItems} rowsPerPage={rowsPerPage} onPageChange={setCurrentPage} onRowsPerPageChange={setRowsPerPage} /></div>
          {modalOpen && canManage && <div className="fixed inset-0 z-50 bg-black/80 flex items-center justify-center p-4" onClick={()=>setModalOpen(false)}><div className="bg-white rounded-2xl shadow-2xl w-full max-w-3xl max-h-[90vh] overflow-y-auto" onClick={e=>e.stopPropagation()}><div className="p-6 border-b flex justify-between items-center bg-slate-800 text-white sticky top-0"><h4 className="text-xl font-bold"><i className={`fas ${editingRow?'fa-edit':'fa-user-plus'} text-blue-400`}></i> {editingRow?'Edit Pegawai':'Tambah Pegawai'}</h4><button onClick={()=>setModalOpen(false)} className="text-3xl leading-none">&times;</button></div><div className="p-6 space-y-4"><div className="grid grid-cols-1 md:grid-cols-2 gap-4"><div><label className="block text-xs font-bold uppercase text-slate-500 mb-1">Username *</label><input type="text" name="Username (MP/ID)" value={formData['Username (MP/ID)']} onChange={handleInputChange} className="w-full border p-3 rounded-xl" required /></div><div><label className="block text-xs font-bold uppercase text-slate-500 mb-1">Password *</label><input type="text" name="Password" value={formData['Password']} onChange={handleInputChange} className="w-full border p-3 rounded-xl" required /></div><div><label className="block text-xs font-bold uppercase text-slate-500 mb-1">Nama Lembaga</label><input type="text" name="Name Lembaga" value={formData['Name Lembaga']} onChange={handleInputChange} className="w-full border p-3 rounded-xl" /></div><div><label className="block text-xs font-bold uppercase text-slate-500 mb-1">Nama Pegawai *</label><input type="text" name="Name Pegawai" value={formData['Name Pegawai']} onChange={handleInputChange} className="w-full border p-3 rounded-xl" required /></div><div><label className="block text-xs font-bold uppercase text-slate-500 mb-1">Latitude</label><input type="text" name="Latitude" value={formData['Latitude']} onChange={handleInputChange} className="w-full border p-3 rounded-xl" /></div><div><label className="block text-xs font-bold uppercase text-slate-500 mb-1">Longitude</label><input type="text" name="Longitude" value={formData['Longitude']} onChange={handleInputChange} className="w-full border p-3 rounded-xl" /></div><div><label className="block text-xs font-bold uppercase text-slate-500 mb-1">Radius (m)</label><input type="text" name="Radius (m)" value={formData['Radius (m)']} onChange={handleInputChange} className="w-full border p-3 rounded-xl" /></div><div><label className="block text-xs font-bold uppercase text-slate-500 mb-1">Role</label><select name="Role" value={formData['Role']} onChange={handleInputChange} className="w-full border p-3 rounded-xl"><option value="">Pilih Role</option><option value="Admin">Admin</option><option value="Superuser">Superuser</option><option value="User">User</option><option value="Supervisor">Supervisor</option></select></div></div><div className="flex justify-end gap-3 pt-4 border-t"><button onClick={()=>setModalOpen(false)} className="px-6 py-3 border-2 border-slate-300 rounded-xl font-bold text-slate-600">Batal</button><button onClick={handleSubmit} disabled={loading} className="px-6 py-3 bg-blue-600 text-white rounded-xl font-bold shadow-lg flex items-center gap-2 disabled:opacity-50">{loading ? 'Menyimpan...' : <><i className="fas fa-save"></i> Simpan</>}</button></div></div></div></div>}
        </div>
      );
    };

    // ==================== KOMPONEN MONITORING ====================
    const Monitoring = ({ presensiData, refreshData, userRole }) => {
      const [filterLembaga, setFilterLembaga] = useState('');
      const [dateStart, setDateStart] = useState('');
      const [dateEnd, setDateEnd] = useState('');
      const isAdmin = userRole === 'Admin';
      const canExport = ['Admin','User','Superuser'].includes(userRole);
      const setThisMonth = () => { const now = new Date(); const first = new Date(now.getFullYear(), now.getMonth(), 1); const last = new Date(now.getFullYear(), now.getMonth()+1, 0); setDateStart(first.toISOString().split('T')[0]); setDateEnd(last.toISOString().split('T')[0]); };
      const clearDateFilter = () => { setDateStart(''); setDateEnd(''); };
      const generateLaporanPDF = () => { const { jsPDF } = window.jspdf; const doc = new jsPDF('l', 'mm', 'a4'); let filtered = presensiData.filter(i => (i['Nama Lembaga']||'').toLowerCase().includes(filterLembaga.toLowerCase())); if(dateStart && dateEnd){ const startNum = dateToNumber(parseIjinDate(dateStart)); const endNum = dateToNumber(parseIjinDate(dateEnd)); if(startNum && endNum) filtered = filtered.filter(item => isDateInRangeNum(parsePresensiDate(item['Waktu']), startNum, endNum)); } doc.setFontSize(18); doc.text("Laporan Monitoring Presensi Korwil Sine", 14, 15); doc.setFontSize(10); doc.text(`Dicetak: ${new Date().toLocaleString('id-ID')}`, 14, 22); let y = 28; if(filterLembaga){ doc.text(`Filter Lembaga: ${filterLembaga}`, 14, y); y+=5; } if(dateStart && dateEnd) doc.text(`Filter Tanggal: ${parseIjinDate(dateStart)} - ${parseIjinDate(dateEnd)}`, 14, y); else if(dateStart) doc.text(`Filter Tanggal: mulai ${parseIjinDate(dateStart)}`, 14, y); else if(dateEnd) doc.text(`Filter Tanggal: sampai ${parseIjinDate(dateEnd)}`, 14, y); const tableData = filtered.map(i => [i.Waktu, i['Nama Pegawai'], i['Nama Lembaga'], i['Jenis Presensi'], i.displayRadius || i['Keterangan Radius'], i['Keterangan Bukti']||'-']); doc.autoTable({ startY: y+5, head: [['Waktu','Nama Pegawai','Lembaga','Jenis','Status Radius','Keterangan']], body: tableData, theme: 'grid', headStyles: { fillColor: [30,41,59], textColor: [255,255,255], fontStyle: 'bold' }, columnStyles: {0:{cellWidth:50}}, didParseCell: (data) => { const item = filtered[data.row.index]; if(item && data.section==='body'){ if(item.isPSW) data.cell.styles.fillColor = [209,250,229]; else if(isTidakHadir(item.displayRadius)) data.cell.styles.fillColor = [0,0,0]; else if(isOutsideRadius(item.displayRadius)) data.cell.styles.fillColor = [254,226,226]; else if(checkLateStatus(item['Waktu'], item['Jenis Presensi'])) data.cell.styles.fillColor = [254,249,195]; } } }); doc.save(`Laporan_Presensi_Sine_${new Date().toISOString().split('T')[0]}.pdf`); };
      const handleReset = async () => { const confirm = await Swal.fire({title:'RESET SEMUA DATA?',text:'Data terhapus permanen!',icon:'warning',showCancelButton:true,confirmButtonColor:'#d33',confirmButtonText:'Ya, Reset'}); if(confirm.isConfirmed){ Swal.fire({title:'Menghapus...',allowOutsideClick:false,didOpen:()=>Swal.showLoading()}); const res = await runGoogleScript('resetDataPresensi'); if(res.success){ Swal.fire('Terhapus','Database presensi dikosongkan','success'); refreshData(); } } };
      return (
        <div className="bg-white p-8 rounded-2xl shadow-sm border space-y-8"><div className="border-b pb-6"><h3 className="text-2xl font-black text-slate-800"><i className="fas fa-file-export text-blue-600"></i> Manajemen Data</h3><p className="text-slate-500 text-sm">Cetak laporan atau bersihkan database</p></div><div className="grid grid-cols-1 md:grid-cols-2 gap-8">{canExport ? <div className="bg-slate-50 p-6 rounded-2xl border"><h4 className="font-bold text-slate-700 mb-4"><i className="fas fa-print text-emerald-600"></i> Ekspor Laporan PDF</h4><div className="space-y-4"><div><label className="text-[10px] font-black text-slate-400 uppercase">Filter Lembaga</label><input type="text" className="w-full border p-3 rounded-xl" placeholder="Nama lembaga..." value={filterLembaga} onChange={e=>setFilterLembaga(e.target.value)} /></div><div><label className="text-[10px] font-black text-slate-400 uppercase">Rentang Tanggal</label><div className="flex flex-wrap gap-3"><input type="date" className="flex-1 border p-3 rounded-xl" value={dateStart} onChange={e=>setDateStart(e.target.value)} /><span>s.d.</span><input type="date" className="flex-1 border p-3 rounded-xl" value={dateEnd} onChange={e=>setDateEnd(e.target.value)} /></div><div className="flex gap-2 mt-2"><button onClick={setThisMonth} className="text-xs bg-blue-100 text-blue-700 px-3 py-1 rounded-full">Bulan Ini</button>{(dateStart||dateEnd) && <button onClick={clearDateFilter} className="text-xs bg-gray-200 text-gray-700 px-3 py-1 rounded-full">Hapus Filter</button>}</div></div><button onClick={generateLaporanPDF} className="w-full bg-slate-800 hover:bg-slate-900 text-white py-4 rounded-xl font-black shadow-lg flex items-center justify-center gap-3"><i className="fas fa-file-pdf text-red-400"></i> UNDUH LAPORAN PDF</button></div></div> : <div className="bg-slate-50 p-6 rounded-2xl border text-center"><p><i className="fas fa-lock mr-2"></i>Anda tidak memiliki akses ekspor</p></div>}<div className="bg-red-50 p-6 rounded-2xl border border-red-100"><div><h4 className="font-bold text-red-800 mb-2"><i className="fas fa-radiation-alt text-red-600"></i> Zona Berbahaya</h4><p className="text-xs text-red-600/70 mb-4">Menghapus semua data Presensi. Aksi permanen.</p>{!isAdmin && <p className="text-xs text-red-600 font-bold mb-2">*Hanya Admin yang dapat reset</p>}</div>{isAdmin ? <button onClick={handleReset} className="w-full border-2 border-red-600 text-red-600 hover:bg-red-600 hover:text-white py-4 rounded-xl font-black transition flex items-center justify-center gap-2"><i className="fas fa-trash-alt"></i> RESET DATA PRESENSI</button> : <button disabled className="w-full border-2 border-gray-400 text-gray-400 bg-gray-100 py-4 rounded-xl font-black cursor-not-allowed"><i className="fas fa-trash-alt"></i> RESET (Terbatas Admin)</button>}</div></div></div>
      );
    };

    // ==================== KOMPONEN LOG AKTIVITAS ====================
    const ActivityLog = ({ userRole }) => {
      const [logs, setLogs] = useState([]);
      const [filterUsername, setFilterUsername] = useState('');
      const [filterAction, setFilterAction] = useState('');
      const [dateStart, setDateStart] = useState('');
      const [dateEnd, setDateEnd] = useState('');
      const [currentPage, setCurrentPage] = useState(1);
      const [rowsPerPage, setRowsPerPage] = useState(10);
      const canView = userRole === 'Admin';
      const fetchLogs = async () => { if(!canView) return; const res = await runGoogleScript('getActivityLogs'); setLogs(res || []); };
      useEffect(() => { if(canView) fetchLogs(); }, [canView]);
      const filtered = useMemo(() => { let res = logs; if(filterUsername) res = res.filter(l=> (l.Username||'').toLowerCase().includes(filterUsername.toLowerCase())); if(filterAction) res = res.filter(l=> (l.Action||'').toLowerCase().includes(filterAction.toLowerCase())); if(dateStart){ const start = new Date(dateStart); start.setHours(0,0,0,0); res = res.filter(l=> new Date(l.Timestamp) >= start); } if(dateEnd){ const end = new Date(dateEnd); end.setHours(23,59,59,999); res = res.filter(l=> new Date(l.Timestamp) <= end); } return res; }, [logs, filterUsername, filterAction, dateStart, dateEnd]);
      const totalItems = filtered.length;
      const effectiveRows = rowsPerPage === totalItems ? totalItems : rowsPerPage;
      const paginated = filtered.slice((currentPage-1)*effectiveRows, currentPage*effectiveRows);
      if(!canView) return <div className="bg-white p-8 rounded-2xl shadow-sm border text-center"><i className="fas fa-lock text-6xl text-gray-400 mb-4"></i><h3 className="text-xl font-bold text-gray-700">Akses Ditolak</h3><p className="text-gray-500 mt-2">Hanya Admin yang dapat melihat log.</p></div>;
      return (
        <div className="space-y-6"><div className="bg-white p-5 rounded-2xl shadow-sm border"><h3 className="font-bold text-xl text-slate-800"><i className="fas fa-history text-blue-600"></i> Log Monitoring</h3><p className="text-slate-500 text-sm">Riwayat login dan aktivitas pengguna.</p></div><div className="bg-white p-5 rounded-2xl shadow-sm border flex flex-wrap gap-4 items-center"><input type="text" placeholder="Cari Username..." className="border p-3 rounded-xl flex-1 text-sm" value={filterUsername} onChange={e=>setFilterUsername(e.target.value)} /><input type="text" placeholder="Cari Aksi..." className="border p-3 rounded-xl flex-1 text-sm" value={filterAction} onChange={e=>setFilterAction(e.target.value)} /><input type="date" placeholder="Mulai" className="border p-3 rounded-xl text-sm" value={dateStart} onChange={e=>setDateStart(e.target.value)} /><input type="date" placeholder="Sampai" className="border p-3 rounded-xl text-sm" value={dateEnd} onChange={e=>setDateEnd(e.target.value)} /><button onClick={()=>{setFilterUsername(''); setFilterAction(''); setDateStart(''); setDateEnd('');}} className="bg-gray-200 hover:bg-gray-300 px-4 py-3 rounded-xl font-bold text-sm">Reset Filter</button></div><div className="bg-white rounded-2xl shadow-sm border overflow-hidden"><div className="overflow-x-auto"><table className="w-full text-sm text-left"><thead className="bg-slate-800 text-white border-b"><tr><th className="px-4 py-4">Timestamp</th><th className="px-4 py-4">Username</th><th className="px-4 py-4">Role</th><th className="px-4 py-4">Action</th><th className="px-4 py-4">Details</th></tr></thead><tbody className="divide-y text-slate-700">{paginated.length>0 ? paginated.map((log,i)=> (<tr key={i}><td className="px-4 py-3 whitespace-nowrap">{log.Timestamp ? new Date(log.Timestamp).toLocaleString('id-ID') : '-'}</td><td className="px-4 py-3 font-medium">{log.Username||'-'}</td><td className="px-4 py-3">{log.Role||'-'}</td><td className="px-4 py-3"><span className={`px-2 py-1 rounded text-[10px] font-black uppercase ${log.Action==='login'?'bg-green-100 text-green-700':'bg-red-100 text-red-700'}`}>{log.Action||'-'}</span></td><td className="px-4 py-3">{log.Details||'-'}</td></tr>)) : <tr><td colSpan="5" className="text-center py-10 text-slate-400 italic">Tidak ada log</td></tr>}</tbody></table></div><TablePagination currentPage={currentPage} totalItems={totalItems} rowsPerPage={rowsPerPage} onPageChange={setCurrentPage} onRowsPerPageChange={(val)=>{setRowsPerPage(val); setCurrentPage(1);}} /></div></div>
      );
    };

    // ==================== KOMPONEN PENGAJUAN PSW ====================
    const PengajuanPSW = ({ user }) => {
      const [pegawaiList, setPegawaiList] = useState([]);
      const [formData, setFormData] = useState({ nip:'', jenis:'', tglAwal:'', tglAkhir:'' });
      const [file, setFile] = useState(null);
      const [loading, setLoading] = useState(false);
      useEffect(() => { const fetchPegawai = async () => { if(!user || !user.lembaga) return; const res = await runGoogleScript('getPegawaiByLembaga', user.lembaga); setPegawaiList(Array.isArray(res)?res:[]); }; fetchPegawai(); }, [user]);
      const handleFileChange = (e) => { const f = e.target.files[0]; if(f){ if(f.type !== 'application/pdf') return Swal.fire('Format Salah','Hanya PDF','warning'); if(f.size > 5*1024*1024) return Swal.fire('Terlalu Besar','Maksimal 5MB','warning'); const reader = new FileReader(); reader.onload = () => setFile({ name: f.name, base64: reader.result }); reader.readAsDataURL(f); } };
      const handleSubmit = async (e) => { e.preventDefault(); if(!file) return Swal.fire('Peringatan','Lampiran PDF wajib','warning'); if(!formData.nip) return Swal.fire('Peringatan','Pilih pegawai','warning'); if(!formData.jenis) return Swal.fire('Peringatan','Pilih kategori','warning'); if(!formData.tglAwal || !formData.tglAkhir) return Swal.fire('Peringatan','Tanggal harus diisi','warning'); const selected = pegawaiList.find(p=>p.nip===formData.nip); if(!selected) return Swal.fire('Error','Data pegawai tidak ditemukan','error'); setLoading(true); const payload = { lembaga: user.lembaga, namaPegawai: selected.nama, nip: selected.nip, jenis: formData.jenis, tglAwal: formData.tglAwal, tglAkhir: formData.tglAkhir, fileName: file.name, fileBase64: file.base64 }; const res = await runGoogleScript('submitPengajuan', payload); setLoading(false); if(res.success){ Swal.fire({icon:'success',title:'Terkirim',text:'Pengajuan berhasil diteruskan ke Korwil.',confirmButtonColor:'#2563eb'}); setFormData({ nip:'', jenis:'', tglAwal:'', tglAkhir:'' }); setFile(null); document.getElementById('fileInput').value = ''; } else Swal.fire('Gagal',res.message,'error'); };
      return (
        <div className="bg-white rounded-2xl shadow-sm border p-6 md:p-8"><div className="border-b pb-5 mb-6"><h3 className="text-xl font-bold text-slate-800">Form Pengajuan PSW</h3><p className="text-sm text-slate-500">Lembaga: <span className="font-semibold text-blue-600">{user.lembaga}</span></p></div><form onSubmit={handleSubmit} className="space-y-6"><div className="grid grid-cols-1 md:grid-cols-2 gap-6"><div className="md:col-span-2"><label className="block text-sm font-semibold text-slate-700 mb-2">Pilih Pegawai</label><select required value={formData.nip} onChange={e=>setFormData({...formData, nip:e.target.value})} className="w-full px-4 py-3 bg-slate-50 border rounded-xl"><option value="" disabled>-- Pilih Pegawai --</option>{pegawaiList.map(p=><option key={p.nip} value={p.nip}>{p.nama} (NIP: {p.nip})</option>)}</select></div><div className="md:col-span-2"><label className="block text-sm font-semibold text-slate-700 mb-2">Kategori Pengajuan</label><div className="grid grid-cols-1 sm:grid-cols-3 gap-4">{['Sakit','Ijin','Dinas Luar'].map(kat=>{ const isSelected = formData.jenis===kat; return (<label key={kat} className={`cursor-pointer border-2 rounded-xl p-4 flex flex-col items-center justify-center transition-all ${isSelected ? 'bg-blue-50 border-blue-500 text-blue-700 shadow-md' : 'bg-white border-slate-100 hover:border-slate-300'}`}><input type="radio" name="jenis" value={kat} className="hidden" checked={isSelected} onChange={e=>setFormData({...formData, jenis:e.target.value})} required /><div className="w-12 h-12 rounded-full mb-2 flex items-center justify-center text-xl bg-slate-100"><i className={`fas ${kat==='Sakit'?'fa-briefcase-medical':kat==='Ijin'?'fa-envelope-open-text':'fa-car-side'}`}></i></div><span className="font-bold text-sm">{kat}</span></label>);})}</div></div><div><label className="block text-sm font-semibold text-slate-700 mb-2">Tanggal Mulai</label><input type="date" required value={formData.tglAwal} onChange={e=>setFormData({...formData, tglAwal:e.target.value})} className="w-full px-4 py-3 bg-slate-50 border rounded-xl" /></div><div><label className="block text-sm font-semibold text-slate-700 mb-2">Tanggal Selesai</label><input type="date" required min={formData.tglAwal} value={formData.tglAkhir} onChange={e=>setFormData({...formData, tglAkhir:e.target.value})} className="w-full px-4 py-3 bg-slate-50 border rounded-xl" /></div><div className="md:col-span-2"><label className="block text-sm font-semibold text-slate-700 mb-2">Lampiran Bukti Dukung (PDF)</label><div className={`border-2 border-dashed rounded-2xl p-8 flex flex-col items-center justify-center relative ${file ? 'border-green-400 bg-green-50' : 'border-slate-300 bg-slate-50 hover:bg-slate-100'}`}><input id="fileInput" type="file" accept=".pdf" onChange={handleFileChange} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" required />{file ? <div className="text-center"><div className="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-3 text-2xl"><i className="fas fa-file-check"></i></div><p className="font-bold text-slate-800 text-sm">{file.name}</p><p className="text-xs text-green-600 mt-1 font-semibold">Siap diunggah - Klik ganti</p></div> : <div className="text-center"><div className="w-16 h-16 bg-blue-100 text-blue-500 rounded-full flex items-center justify-center mx-auto mb-3 text-2xl"><i className="fas fa-cloud-upload-alt"></i></div><p className="font-bold text-slate-700">Klik atau Tarik file PDF ke sini</p><p className="text-xs text-slate-500 mt-1">Maksimal 5MB</p></div>}</div></div></div><div className="pt-6 border-t flex justify-end"><button type="submit" disabled={loading} className="w-full md:w-auto px-8 py-3.5 bg-gradient-to-r from-blue-600 to-indigo-700 text-white rounded-xl font-bold text-sm shadow-lg shadow-blue-500/30 hover:opacity-90 transition-all disabled:opacity-70 flex items-center justify-center gap-2">{loading ? <i className="fas fa-spinner fa-spin"></i> : <i className="fas fa-paper-plane"></i>} {loading ? 'Memproses...' : 'Kirim Pengajuan'}</button></div></form></div>
      );
    };

    // ==================== APLIKASI UTAMA ====================
    const App = () => {
      const [user, setUser] = useState(null);
      const [activeTab, setActiveTab] = useState('dashboard');
      const [presensi, setPresensi] = useState([]);
      const [ijin, setIjin] = useState([]);
      const [loading, setLoading] = useState(false);
      const [globalError, setGlobalError] = useState(null);

      const fetchData = async () => { if(!user) return; setLoading(true); setGlobalError(null); try { const [resP, resI] = await Promise.all([runGoogleScript('getPresensi'), runGoogleScript('getIjin')]); setPresensi(Array.isArray(resP) ? resP : []); setIjin(Array.isArray(resI) ? resI : []); } catch(e){ setGlobalError('Gagal mengambil data. Periksa koneksi atau backend.'); console.error(e); } setLoading(false); };
      useEffect(() => { if(user) fetchData(); }, [user]);
      const enrichedPresensi = useMemo(() => enrichPresensiWithIjin(presensi, ijin), [presensi, ijin]);
      const canAccessPegawai = user && ['Admin','Superuser','User'].includes(user.role);
      const canEditAllLembaga = user && ['Admin','Superuser','User'].includes(user.role);
      const userLembaga = !canEditAllLembaga ? (user ? user.role : '') : (user ? user.lembaga : '');
      const tabs = [
        {id:'dashboard', icon:'fa-chart-pie', label:'Dashboard Presensi'},
        {id:'dokumen_ijin', icon:'fa-file-signature', label:'Dokumen Ijin (PSW)'},
        {id:'pengajuan_psw', icon:'fa-file-upload', label:'Pengajuan PSW'},
        ...(canAccessPegawai ? [{id:'pegawai', icon:'fa-users', label:'Database Pegawai'}] : []),
        {id:'monitoring', icon:'fa-desktop', label:'Monitoring & Ekspor'},
        {id:'activity', icon:'fa-history', label:'Error Logs'}
      ];
      const handleLogout = () => { Swal.fire({title:'Yakin keluar?',icon:'question',showCancelButton:true,confirmButtonColor:'#d33',confirmButtonText:'Ya, Keluar'}).then(res=>{if(res.isConfirmed) setUser(null);}); };
      if(!user) return <Login onLogin={setUser} />;
      return (
        <div className="min-h-screen flex flex-col md:flex-row bg-slate-100">
          <div className="w-full md:w-72 bg-slate-900 text-white flex flex-col shadow-2xl z-40">
            <div className="p-8 border-b border-slate-800 flex items-center gap-4 bg-slate-950/50"><div className="bg-blue-600 w-12 h-12 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-500/20 overflow-hidden"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c8/Lambang_Kabupaten_Ngawi_%28svg%29.svg/1280px-Lambang_Kabupaten_Ngawi_%28svg%29.svg.png" alt="Logo Ngawi" className="w-full h-full object-cover" onError={(e)=>{e.target.onerror=null; e.target.src='https://via.placeholder.com/48?text=Logo';}} /></div><div><span className="font-black text-xl tracking-tighter block">KORWIL SINE</span><span className="text-[10px] text-blue-400 font-bold uppercase tracking-widest">Dashboard Monitoring</span></div></div>
            <nav className="flex-1 p-6 space-y-2">{tabs.map(tab=>(<button key={tab.id} onClick={()=>setActiveTab(tab.id)} className={`w-full flex items-center gap-4 px-5 py-4 rounded-2xl font-bold transition-all duration-300 ${activeTab===tab.id ? 'bg-blue-600 text-white shadow-xl translate-x-1' : 'text-slate-500 hover:bg-slate-800 hover:text-slate-300'}`}><i className={`fas ${tab.icon} w-6 text-center text-lg`}></i> {tab.label}</button>))}</nav>
            <div className="p-6 border-t border-slate-800 bg-slate-950/30"><div className="flex items-center gap-4 mb-6 px-2"><div className="w-10 h-10 rounded-full bg-slate-700 flex items-center justify-center border-2 border-blue-500/30 text-blue-400 font-black">{user.nama.charAt(0)}</div><div><div className="text-xs text-slate-500 font-bold uppercase">Petugas:</div><div className="font-black text-sm text-slate-200 truncate">{user.nama}</div><div className="mt-1"><span className="px-2 py-0.5 bg-blue-600/20 text-blue-400 rounded-full text-[8px] font-black uppercase">{user.role}</span></div>{userLembaga && <div className="mt-1 text-[10px] text-slate-400"><i className="fas fa-building mr-1"></i>{userLembaga}</div>}</div></div><button onClick={handleLogout} className="w-full bg-red-600/10 hover:bg-red-600 text-red-500 hover:text-white py-3 rounded-xl font-black transition-all border border-red-500/20 flex items-center justify-center gap-2"><i className="fas fa-power-off"></i> KELUAR</button></div>
          </div>
          <div className="flex-1 flex flex-col h-screen overflow-hidden"><header className="bg-white/80 backdrop-blur-md border-b px-8 py-5 flex justify-between items-center z-30 shadow-sm"><h2 className="text-2xl font-black text-slate-800 capitalize flex items-center gap-3"><span className="w-2 h-8 bg-blue-600 rounded-full"></span>{activeTab==='dashboard'?'Dashboard Presensi':activeTab==='dokumen_ijin'?'Dokumen Ijin (PSW)':activeTab==='pengajuan_psw'?'Pengajuan PSW':activeTab==='pegawai'?'Database Pegawai':activeTab==='monitoring'?'Monitoring & Ekspor':'Log Monitoring'}</h2><button onClick={fetchData} className={`w-12 h-12 rounded-2xl flex items-center justify-center hover:bg-blue-50 text-slate-400 hover:text-blue-600 transition-all border border-slate-100 ${loading?'bg-blue-50':'bg-white'}`}><i className={`fas fa-sync-alt text-lg ${loading?'fa-spin text-blue-600':''}`}></i></button></header><div className="flex-1 overflow-auto p-4 md:p-8">{globalError && <div className="bg-red-100 border-l-4 border-red-600 text-red-700 p-4 mb-4 rounded shadow"><p className="font-bold"><i className="fas fa-exclamation-triangle mr-2"></i>Koneksi Bermasalah</p><p>{globalError}</p></div>}{loading && presensi.length===0 && activeTab!=='pegawai' ? <div className="h-full flex flex-col items-center justify-center space-y-6"><div className="loader border-4 border-blue-100 border-t-blue-600 rounded-full w-16 h-16"></div><div className="text-center"><span className="text-slate-800 font-black text-xl block">Menghubungkan ke Server...</span><span className="text-slate-400 text-sm">Sedang sinkronisasi</span></div></div> : <div className="max-w-7xl mx-auto">{activeTab==='dashboard' && <Dashboard data={enrichedPresensi} refreshData={fetchData} userRole={user.role} userLembaga={userLembaga} />}{activeTab==='dokumen_ijin' && <DokumenIjin data={ijin} refreshData={fetchData} userRole={user.role} userLembaga={userLembaga} />}{activeTab==='pengajuan_psw' && <PengajuanPSW user={user} />}{activeTab==='pegawai' && canAccessPegawai && <DatabasePegawai refreshParent={fetchData} userRole={user.role} />}{activeTab==='monitoring' && <Monitoring presensiData={enrichedPresensi} refreshData={fetchData} userRole={user.role} />}{activeTab==='activity' && <ActivityLog userRole={user.role} />}</div>}</div></div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
